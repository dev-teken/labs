<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Elementos</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   BASE
═══════════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{
  height:100dvh;overflow:hidden;
  background:#06080d;font-family:'Cinzel',serif;color:#e8dcc8;
  display:flex;flex-direction:column;
  max-width:430px;margin:0 auto;
  user-select:none;-webkit-user-select:none;
  padding:env(safe-area-inset-top,0) 0 env(safe-area-inset-bottom,0);
}

/* ── NÉVOA DE FUNDO ── */
#bg-base{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 50% at 50% -5%,rgba(40,20,80,.7),transparent),
    linear-gradient(180deg,#06080d 0%,#080c16 100%);}
#bg-glow{position:fixed;inset:0;z-index:0;pointer-events:none;transition:background 1.6s ease;}
.spark{position:fixed;z-index:1;pointer-events:none;border-radius:50%;animation:sparkUp linear infinite;opacity:0;}
@keyframes sparkUp{
  0%{transform:translateY(102dvh) translateX(0) scale(0);opacity:0;}
  6%{opacity:.8;}80%{opacity:.25;}
  100%{transform:translateY(-20px) translateX(var(--sx,0)) scale(1.4);opacity:0;}
}

/* ═══════════════════════════════════════════════════
   HUD
═══════════════════════════════════════════════════ */
#hud{
  flex:0 0 auto;z-index:20;position:relative;
  display:grid;grid-template-columns:1fr auto 1fr;
  align-items:center;
  padding:clamp(8px,1.8dvh,14px) 14px clamp(4px,1dvh,7px);
}
.pb{display:flex;flex-direction:column;gap:3px;}
.pb.r{align-items:flex-end;}
.pn{font-size:8px;letter-spacing:3px;text-transform:uppercase;font-weight:700;opacity:.45;}
.pn.c1{color:#7ecfff;} .pn.c2{color:#ff8080;}

/* barra de saúde do jogador (não das cartas) */
.player-hp-bar{
  width:clamp(80px,18vw,110px);height:5px;
  background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;
  position:relative;
}
.player-hp-fill{
  height:100%;border-radius:99px;
  transition:width .6s cubic-bezier(.4,0,.2,1),background .4s;
  position:relative;
}
.player-hp-fill::after{
  content:'';position:absolute;top:0;left:0;right:0;height:40%;
  background:rgba(255,255,255,.3);border-radius:99px;
}
.php-count{font-size:9px;font-weight:700;letter-spacing:.5px;opacity:.7;margin-top:1px;}

/* rodada central */
#rd{display:flex;flex-direction:column;align-items:center;gap:0;}
#rd-lbl{font-size:7px;letter-spacing:3px;text-transform:uppercase;color:#c8a84a;opacity:.55;}
#rd-n{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(22px,5dvh,34px);color:#c8a84a;line-height:1;
  text-shadow:0 2px 0 #7a5a00,0 0 22px rgba(200,168,74,.5);
}
/* indicador do último vencedor */
#last-winner{
  font-size:7px;letter-spacing:1.5px;text-transform:uppercase;
  color:rgba(200,168,74,.6);min-height:10px;text-align:center;
  font-style:italic;
}

/* ═══════════════════════════════════════════════════
   ARENA
═══════════════════════════════════════════════════ */
#arena-wrap{flex:0 0 auto;z-index:15;padding:0 10px;}
#arena{
  position:relative;border-radius:22px;
  border:1.5px solid rgba(200,168,74,.14);
  background:
    radial-gradient(ellipse 85% 70% at 50% 50%,rgba(255,255,255,.02),transparent 70%),
    linear-gradient(180deg,rgba(12,16,28,.96),rgba(6,8,14,.98));
  box-shadow:inset 0 0 50px rgba(0,0,0,.8),inset 0 0 2px rgba(200,168,74,.1),0 3px 20px rgba(0,0,0,.6);
  display:grid;grid-template-columns:1fr 32px 1fr;
  align-items:stretch;padding:8px 8px;
  min-height:clamp(96px,18dvh,138px);overflow:hidden;
}
#arena::before{
  content:'';position:absolute;left:50%;top:8%;bottom:8%;width:1px;
  background:repeating-linear-gradient(180deg,rgba(200,168,74,.22) 0,rgba(200,168,74,.22) 5px,transparent 5px,transparent 10px);
  transform:translateX(-50%);pointer-events:none;
}
#arena-vs{display:flex;align-items:center;justify-content:center;position:relative;z-index:2;}
#arena-vs span{
  font-family:'Cinzel Decorative',serif;font-size:10px;color:#c8a84a;
  text-shadow:0 0 14px rgba(200,168,74,.5);
  background:rgba(6,8,13,.85);border:1px solid rgba(200,168,74,.22);
  border-radius:50%;width:26px;height:26px;
  display:flex;align-items:center;justify-content:center;
}

/* zona de drop */
.dz{
  border-radius:14px;border:2px dashed rgba(255,255,255,.08);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;position:relative;overflow:hidden;
  transition:border-color .3s,background .3s,box-shadow .3s;
}
.dz.lit{
  border-color:rgba(200,168,74,.5);background:rgba(200,168,74,.04);
  animation:dzBreath 1.2s ease-in-out infinite;
}
@keyframes dzBreath{0%,100%{box-shadow:inset 0 0 16px rgba(200,168,74,.06);}50%{box-shadow:inset 0 0 28px rgba(200,168,74,.12),0 0 22px rgba(200,168,74,.1);}}
.dz.filled{border-style:solid;border-width:1.5px;}
.dz-lbl{font-size:7px;letter-spacing:2px;text-transform:uppercase;opacity:.45;position:absolute;top:5px;left:7px;}
.dz-icon{font-size:18px;opacity:.1;}
.dz-hint{font-size:7.5px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.18);}

/* mini-card na arena — estrutura portrait */
.arena-card{
  position:absolute;inset:0;border-radius:13px;overflow:hidden;
  border:1.5px solid rgba(200,168,74,.25);
  display:flex;flex-direction:column;
  transition:transform .4s cubic-bezier(.34,1.3,.64,1),filter .4s,opacity .4s;
}
.arena-card.winner{
  border-color:rgba(200,168,74,.75)!important;
  box-shadow:0 0 0 2px rgba(200,168,74,.4),0 0 28px rgba(200,168,74,.2)!important;
  transform:scale(1.05) translateY(-4px)!important;
  animation:winPulse 1.4s ease-in-out infinite;
}
@keyframes winPulse{0%,100%{box-shadow:0 0 0 2px rgba(200,168,74,.4),0 0 28px rgba(200,168,74,.18);}50%{box-shadow:0 0 0 3px rgba(200,168,74,.6),0 0 40px rgba(200,168,74,.3);}}
.arena-card.loser{filter:saturate(.1) brightness(.4)!important;transform:scale(.91)!important;}
.arena-card.draw{border-color:rgba(255,255,255,.2)!important;}

/* portrait da arena */
.ac-portrait{
  flex:1;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.ac-portrait-bg{position:absolute;inset:0;}
.ac-portrait-shine{position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.18),transparent);pointer-events:none;}
.ac-portrait-em{
  position:relative;z-index:2;
  font-size:clamp(20px,4.5dvh,30px);
  filter:drop-shadow(0 2px 12px rgba(0,0,0,.9));
  animation:acFloat 3s ease-in-out infinite;
}
@keyframes acFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.ac-overlay-name{
  position:absolute;bottom:0;left:0;right:0;z-index:3;
  background:linear-gradient(0deg,rgba(0,0,0,.8),transparent);
  padding:4px 5px 3px;
  font-size:clamp(6px,1.3vw,8px);font-weight:700;letter-spacing:.5px;
  text-transform:uppercase;text-align:center;color:#fff;
  text-shadow:0 1px 4px rgba(0,0,0,1);
}

/* footer da arena card */
.ac-footer{
  flex:0 0 auto;
  background:rgba(0,0,0,.75);
  padding:3px 5px;
  display:flex;flex-direction:column;gap:2px;
}
.ac-stats-row{display:flex;gap:2px;}
.acst{flex:1;background:rgba(0,0,0,.4);border-radius:3px;border:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;align-items:center;padding:1px 2px;}
.acst-l{font-size:4px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.3);}
.acst-v{font-size:clamp(8px,1.8vw,11px);font-weight:800;line-height:1;}
.acst.a .acst-v{color:#f4a0a0;} .acst.d .acst-v{color:#90c0f4;}

/* barra de energia na arena */
.ac-energy-bar{height:4px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;position:relative;}
.ac-energy-fill{height:100%;border-radius:99px;transition:width .7s cubic-bezier(.4,0,.2,1),background .4s;}
.ac-energy-fill::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:rgba(255,255,255,.35);border-radius:99px;}

/* badge resultado */
.ac-badge{
  position:absolute;top:4px;right:4px;z-index:10;
  font-size:7px;font-weight:700;letter-spacing:.5px;border-radius:20px;padding:2px 6px;
  animation:popIn .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{opacity:0;transform:scale(.2) translateY(-4px)}to{opacity:1;transform:none}}
.ab-win{background:rgba(200,168,74,.92);color:#1a1000;}
.ab-lose{background:rgba(190,40,40,.9);color:#fff;}
.ab-draw{background:rgba(255,255,255,.1);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.12);}

/* ═══════════════════════════════════════════════════
   MÃO  2 + 3, fixada no fundo
═══════════════════════════════════════════════════ */
#hand-wrap{
  flex:1;min-height:0;z-index:10;position:relative;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:4px 8px clamp(6px,1.5dvh,10px);gap:0;
}
#phase-msg{
  text-align:center;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;
  color:#c8a84a;opacity:.65;min-height:14px;padding-bottom:4px;
}
.hand-row{display:flex;gap:clamp(5px,1.4vw,8px);justify-content:center;align-items:flex-end;}
.hand-row.top{padding:0 clamp(22px,9vw,54px);margin-bottom:clamp(3px,1dvh,6px);}

/* ═══════════════════════════════════════════════════
   CARTA — PROPORÇÃO PORTRAIT + VITRAL MAGIC
═══════════════════════════════════════════════════ */
.hcard{
  position:relative;
  width:clamp(80px,18.5vw,106px);
  aspect-ratio:63/88;          /* Magic the Gathering ratio */
  flex:0 0 auto;
  border-radius:10px;
  cursor:grab;touch-action:none;
  transition:
    transform .22s cubic-bezier(.34,1.56,.64,1),
    box-shadow .2s, filter .15s;
  will-change:transform;
  /* perspective para flip */
  perspective:600px;
}
.hcard.dead{opacity:.12;pointer-events:none;filter:grayscale(1);}
.hcard.last-winner{
  filter:brightness(1.1) saturate(1.2);
  z-index:12;
}
.hcard.dragging{cursor:grabbing;opacity:.25;}

/* flip wrapper */
.card-flipper{
  position:absolute;inset:0;
  transform-style:preserve-3d;
  transition:transform .55s cubic-bezier(.4,0,.2,1);
  border-radius:10px;
}
.hcard.flipped .card-flipper{transform:rotateY(180deg);}

.card-face{
  position:absolute;inset:0;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:10px;overflow:hidden;
}
.card-back-face{transform:rotateY(180deg);}

/* ── FRENTE DA CARTA ── */
.cf-frame{
  position:absolute;inset:0;border-radius:10px;overflow:hidden;
  border:2px solid var(--cborder,rgba(200,168,74,.55));
  box-shadow:
    0 0 0 1px rgba(0,0,0,.9),
    0 6px 20px rgba(0,0,0,.85),
    inset 0 0 0 1px rgba(255,255,255,.05),
    0 0 28px var(--cglow,transparent);
}

/* vitral de fundo */
.cf-vitral{position:absolute;inset:0;background:var(--cvitral);}

/* brilho topo */
.cf-shine{position:absolute;top:0;left:0;right:0;height:35%;
  background:linear-gradient(180deg,rgba(255,255,255,.22),rgba(255,255,255,.04) 60%,transparent);
  border-radius:8px 8px 0 0;pointer-events:none;z-index:6;}

/* linha ornamental interna */
.cf-frame::before{
  content:'';position:absolute;inset:3px;border-radius:7px;
  border:1px solid rgba(255,255,255,.1);z-index:2;pointer-events:none;
}
/* segunda linha */
.cf-frame::after{
  content:'';position:absolute;inset:5px;border-radius:6px;
  border:1px solid rgba(255,255,255,.05);z-index:2;pointer-events:none;
}

/* cabeçalho */
.cf-header{
  position:absolute;top:6px;left:7px;right:7px;z-index:8;
  display:flex;justify-content:space-between;align-items:flex-start;
}
.cf-name{
  font-family:'Cinzel',serif;font-size:clamp(5px,1.05vw,7px);font-weight:700;
  letter-spacing:.3px;color:#fff;line-height:1.1;max-width:68%;
  text-shadow:0 0 10px rgba(0,0,0,1),0 1px 3px rgba(0,0,0,1);
}
.cf-cost{
  font-size:clamp(8px,1.8vw,12px);
  filter:drop-shadow(0 0 5px rgba(0,0,0,.9));
  line-height:1;
}

/* ══ PORTRAIT — área principal da arte ══ */
.cf-portrait{
  position:absolute;
  top:22px;left:6px;right:6px;
  height:40%;
  border-radius:5px;overflow:hidden;z-index:4;
  background:var(--cvitral);
  box-shadow:inset 0 0 12px rgba(0,0,0,.6),0 2px 8px rgba(0,0,0,.5);
  border:1px solid rgba(255,255,255,.1);
}
/* vitral do portrait — padrão caleidoscópio */
.cf-portrait-bg{
  position:absolute;inset:0;
  background:var(--cportrait);
  animation:portraitShimmer 8s ease-in-out infinite;
}
@keyframes portraitShimmer{
  0%,100%{filter:brightness(1) saturate(1);}
  50%{filter:brightness(1.1) saturate(1.3);}
}
/* raios do vitral */
.cf-portrait-rays{
  position:absolute;inset:0;
  background:
    repeating-conic-gradient(
      from 0deg at 50% 60%,
      var(--cray1,transparent) 0deg 10deg,
      transparent 10deg 20deg
    );
  opacity:.15;mix-blend-mode:overlay;
}
.cf-portrait-em{
  position:absolute;inset:0;z-index:3;
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(22px,5.5dvh,34px);
  filter:drop-shadow(0 2px 12px rgba(0,0,0,.95)) drop-shadow(0 0 20px var(--cglow,transparent));
  animation:emFloat 4s ease-in-out infinite;
}
@keyframes emFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-4px) scale(1.04)}}
.cf-portrait-overlay{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(0deg,rgba(0,0,0,.75) 0%,transparent 100%);
  height:35%;pointer-events:none;
}

/* faixa de tipo */
.cf-type{
  position:absolute;
  top:calc(22px + 40% + 4px);
  left:6px;right:6px;z-index:7;
  background:rgba(0,0,0,.72);
  border-top:1px solid rgba(255,255,255,.12);border-bottom:1px solid rgba(255,255,255,.06);
  padding:2px 5px;display:flex;justify-content:space-between;align-items:center;
}
.cf-type-name{
  font-family:'IM Fell English',serif;font-style:italic;
  font-size:clamp(4.5px,.95vw,6.5px);color:rgba(255,255,255,.5);letter-spacing:.2px;
}
.cf-type-el{font-size:clamp(4px,.85vw,6px);letter-spacing:1.8px;text-transform:uppercase;font-weight:700;color:var(--caccent,rgba(255,255,255,.35));}

/* caixa de texto + stats + energia */
.cf-textbox{
  position:absolute;
  top:calc(22px + 40% + 4px + 14px);
  left:6px;right:6px;bottom:7px;z-index:7;
  background:rgba(0,0,0,.58);
  border:1px solid rgba(255,255,255,.07);border-radius:4px;
  padding:3px 4px;display:flex;flex-direction:column;gap:2px;justify-content:space-between;
}

.cf-stats{display:flex;gap:3px;}
.cfst{flex:1;border-radius:4px;display:flex;flex-direction:column;align-items:center;padding:2px 2px;}
.cfst.a{background:rgba(160,40,40,.28);border:1px solid rgba(220,70,70,.5);}
.cfst.d{background:rgba(40,80,160,.28);border:1px solid rgba(70,120,220,.5);}
.cfst-l{font-size:4px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.3);line-height:1;}
.cfst-v{font-size:clamp(9px,2.1vw,12px);font-weight:800;line-height:1.1;color:#fff;}
.cfst.a .cfst-v{color:#f4a0a0;text-shadow:0 0 8px rgba(240,80,80,.5);}
.cfst.d .cfst-v{color:#90c0f4;text-shadow:0 0 8px rgba(80,150,240,.5);}

/* barra de energia */
.cf-energy-wrap{display:flex;flex-direction:column;gap:1px;}
.cf-energy-label{font-size:4px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.28);display:flex;justify-content:space-between;align-items:center;}
.cf-energy-pts{font-size:5px;font-weight:700;color:var(--caccent,rgba(255,255,255,.4));}
.cf-energy-bar{height:5px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;position:relative;}
.cf-energy-fill{height:100%;border-radius:99px;transition:width .7s cubic-bezier(.4,0,.2,1),background .5s;position:relative;}
.cf-energy-fill::after{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:rgba(255,255,255,.32);border-radius:99px;}

/* "beats" - ícones elementais que vence */
.cf-beats{display:flex;align-items:center;gap:2px;justify-content:center;}
.cf-beats-lbl{font-size:4px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.2);}
.cf-beats-em{font-size:7px;opacity:.6;}

/* ── VERSO DA CARTA ── */
.card-back-face .cf-frame{
  background:
    radial-gradient(ellipse 70% 60% at 50% 40%,#1a0a2a,#06080d),
    repeating-conic-gradient(from 0deg at 50% 50%,rgba(200,168,74,.04) 0deg 5deg,transparent 5deg 10deg);
  border-color:rgba(200,168,74,.3);
}
.card-back-pattern{
  position:absolute;inset:8px;border-radius:6px;
  border:1px solid rgba(200,168,74,.2);
  background:
    radial-gradient(ellipse at 50% 50%,rgba(200,168,74,.07),transparent 70%),
    repeating-linear-gradient(45deg,transparent,transparent 6px,rgba(200,168,74,.03) 6px,rgba(200,168,74,.03) 7px);
  display:flex;align-items:center;justify-content:center;
}
.card-back-rune{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(14px,4dvh,22px);color:rgba(200,168,74,.3);
  text-shadow:0 0 20px rgba(200,168,74,.2);
}

/* ── CURSOR DE SELEÇÃO ── */
.hcard.selected .cf-frame{
  border-color:rgba(200,168,74,.85)!important;
  box-shadow:
    0 0 0 1px rgba(0,0,0,.9),
    0 10px 30px rgba(0,0,0,.9),
    0 0 0 2px rgba(200,168,74,.5),
    0 0 40px var(--cglow,rgba(200,168,74,.3))!important;
}
.hcard.selected{transform:translateY(-14px) scale(1.1)!important;z-index:20;}

/* ── ANIMAÇÃO DE MORTE ── */
.hcard.dying{animation:cardDie .6s cubic-bezier(.4,0,1,1) forwards;pointer-events:none;}
@keyframes cardDie{
  0%{transform:scale(1) rotate(0);opacity:1;}
  30%{transform:scale(1.15) rotate(-5deg);}
  100%{transform:translateY(-120dvh) rotate(-30deg) scale(.3);opacity:0;}
}

/* ── ÚLTIMO VENCEDOR ── */
.hcard.prev-winner .cf-frame{
  border-color:rgba(200,168,74,.6)!important;
  box-shadow:0 0 0 1px rgba(0,0,0,.9),0 5px 16px rgba(0,0,0,.8),0 0 18px rgba(200,168,74,.25)!important;
}
.hcard.prev-winner::after{
  content:'⚔';
  position:absolute;top:-6px;right:-4px;z-index:30;
  font-size:12px;
  filter:drop-shadow(0 0 6px rgba(200,168,74,.8));
  animation:swordBob 1.5s ease-in-out infinite;
}
@keyframes swordBob{0%,100%{transform:translateY(0) rotate(-10deg)}50%{transform:translateY(-3px) rotate(10deg)}}

/* drag ghost */
#drag-ghost{position:fixed;z-index:300;pointer-events:none;opacity:.9;display:none;transform-origin:center center;}

/* ═══ ANIMAÇÕES DE COMBATE ═══ */

/* carta vencedora bate na perdedora */
@keyframes winSmash{
  0%{transform:scale(1.05) translateY(-4px);}
  18%{transform:scale(1.12) translateX(var(--smash-x,40px)) translateY(-4px) rotate(var(--smash-r,5deg));}
  36%{transform:scale(1.08) translateX(calc(var(--smash-x,40px)*.4)) translateY(-4px);}
  60%{transform:scale(1.06) translateY(-4px);}
  100%{transform:scale(1.05) translateY(-4px);}
}
.arena-card.smashing{
  animation:winSmash .55s cubic-bezier(.34,1.2,.64,1) forwards!important;
}
/* perdedora treme ao receber golpe */
@keyframes hitShake{
  0%{transform:scale(.91);}
  15%{transform:scale(.91) translateX(-6px) rotate(-2deg);}
  35%{transform:scale(.91) translateX(5px) rotate(1.5deg);}
  55%{transform:scale(.91) translateX(-3px);}
  75%{transform:scale(.91) translateX(2px);}
  100%{transform:scale(.91);}
}
.arena-card.hit-shake{animation:hitShake .45s ease both!important;}

/* flash de impacto na arena */
@keyframes arenaFlash{
  0%{opacity:0;}20%{opacity:1;}100%{opacity:0;}
}
#arena-impact{
  position:absolute;inset:0;z-index:20;pointer-events:none;
  border-radius:22px;opacity:0;
  background:radial-gradient(ellipse at 50% 50%,rgba(255,255,255,.18),transparent 60%);
}

/* ── NÚMERO DE DANO FLUTUANTE ── */
.dmg-float{
  position:fixed;z-index:500;pointer-events:none;
  font-family:'Cinzel Decorative',serif;
  font-weight:700;
  text-align:center;
  animation:dmgRise var(--dur,1.8s) cubic-bezier(.2,0,.4,1) forwards;
  white-space:nowrap;
  line-height:1;
}
@keyframes dmgRise{
  0%{opacity:0;transform:translateY(0) scale(.5);}
  12%{opacity:1;transform:translateY(-10px) scale(1.2);}
  30%{transform:translateY(-28px) scale(1);}
  70%{opacity:1;transform:translateY(-56px) scale(1);}
  100%{opacity:0;transform:translateY(-88px) scale(.8);}
}
/* número zero — cinza pequeno */
.dmg-float.zero{font-size:14px;color:rgba(255,255,255,.3);--dur:1.2s;}

/* ── DRENAGEM DE ENERGIA ANIMADA ── */
/* a barra fica com classe draining enquanto drena */
.cf-energy-fill.draining{transition:width 1.1s cubic-bezier(.6,0,.4,1),background .8s;}
.ac-energy-fill.draining{transition:width 1.1s cubic-bezier(.6,0,.4,1);}

/* ── CARTA VOLTANDO AO DECK ── */
@keyframes returnToDeck{
  0%{opacity:1;transform:scale(1) rotate(0);}
  30%{opacity:.9;transform:scale(.85) rotate(var(--ret-rot,5deg)) translateY(-8px);}
  100%{opacity:0;transform:scale(.1) translateX(var(--ret-x,0)) translateY(var(--ret-y,80px)) rotate(var(--ret-rot2,20deg));}
}
.arena-card.returning{
  animation:returnToDeck .65s cubic-bezier(.6,0,1,.8) forwards!important;
  z-index:30;
}

/* ── COUNTDOWN de AUTO-AVANÇO ── */
#auto-advance{
  position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 56px);
  left:50%;transform:translateX(-50%);
  z-index:25;
  display:flex;align-items:center;gap:6px;
  background:rgba(0,0,0,.6);border:1px solid rgba(200,168,74,.2);
  border-radius:99px;padding:5px 14px;
  font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:rgba(200,168,74,.65);
  opacity:0;pointer-events:none;
  transition:opacity .3s;
}
#auto-advance.visible{opacity:1;pointer-events:auto;}
#auto-timer-arc{
  width:16px;height:16px;position:relative;flex:0 0 auto;
}
#auto-timer-arc svg{position:absolute;inset:0;}
#auto-timer-circle{
  stroke-dasharray:44;
  stroke-dashoffset:44;
  transition:stroke-dashoffset linear;
  stroke:rgba(200,168,74,.7);fill:none;stroke-width:2.5;stroke-linecap:round;
}
#auto-tap-skip{font-size:8px;opacity:.5;cursor:pointer;text-decoration:underline;margin-left:4px;}

#action-btn{
  flex:0 0 auto;z-index:20;margin:3px 12px 4px;
  font-family:'Cinzel',serif;font-size:clamp(12px,2.6dvh,16px);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  border:none;border-radius:12px;padding:clamp(10px,2.2dvh,14px) 0;width:calc(100% - 24px);
  cursor:pointer;position:relative;overflow:hidden;
  box-shadow:0 5px 0 rgba(0,0,0,.55),0 6px 18px rgba(0,0,0,.4);
  transition:transform .1s,box-shadow .1s,opacity .2s;
}
#action-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.16),transparent 55%);pointer-events:none;}
#action-btn:active:not(:disabled){transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.55);}
#action-btn:disabled{opacity:.15;cursor:default;}

/* ═══════════════════════════════════════════════════
   PASS SCREEN
═══════════════════════════════════════════════════ */
#pass-screen{display:none;position:fixed;inset:0;z-index:150;
  background:radial-gradient(ellipse at center,#100c1a,#06080d);
  flex-direction:column;align-items:center;justify-content:center;
  gap:clamp(14px,3.5dvh,24px);padding:28px;}
#pass-screen.show{display:flex;}
#ps-icon{font-size:clamp(54px,13dvh,78px);animation:sway 2.4s ease-in-out infinite;filter:drop-shadow(0 4px 18px rgba(0,0,0,.7));}
@keyframes sway{0%,100%{transform:rotate(-5deg) scale(1)}50%{transform:rotate(5deg) scale(1.07)}}
#ps-who{font-family:'Cinzel Decorative',serif;font-size:clamp(16px,3.8dvh,22px);text-align:center;text-shadow:0 2px 10px rgba(0,0,0,.9);}
#ps-msg{font-family:'IM Fell English',serif;font-style:italic;font-size:clamp(13px,2.8dvh,17px);color:rgba(232,220,200,.48);text-align:center;max-width:280px;line-height:1.5;}
#ps-btn{
  font-family:'Cinzel',serif;font-size:clamp(13px,2.8dvh,17px);font-weight:700;letter-spacing:1px;
  border:none;border-radius:12px;padding:clamp(12px,2.7dvh,16px) clamp(34px,9vw,54px);
  cursor:pointer;position:relative;overflow:hidden;
  box-shadow:0 5px 0 rgba(0,0,0,.55),0 6px 20px rgba(0,0,0,.4);transition:transform .1s,box-shadow .1s;
}
#ps-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.18),transparent 55%);pointer-events:none;}
#ps-btn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.5);}

/* ═══════════════════════════════════════════════════
   PPR SCREEN — carta flip + opções
═══════════════════════════════════════════════════ */
#ppr-screen{display:none;position:fixed;inset:0;z-index:140;
  flex-direction:column;align-items:center;justify-content:space-between;
  padding:clamp(12px,2.8dvh,20px) 16px clamp(10px,2.2dvh,16px);}
#ppr-screen.show{display:flex;}
#ppr-bg{position:absolute;inset:0;z-index:0;transition:background 1s;}

/* carta grande no PPR com flip */
#ppr-card-wrap{
  flex:0 0 auto;z-index:2;
  width:clamp(140px,34vw,180px);
  aspect-ratio:63/88;
  perspective:800px;
}
#ppr-card-inner{
  width:100%;height:100%;
  transform-style:preserve-3d;
  animation:bigFlipIn .6s cubic-bezier(.34,1.2,.64,1) both;
}
@keyframes bigFlipIn{
  from{transform:rotateY(-90deg) scale(.7);opacity:0;}
  to{transform:rotateY(0) scale(1);opacity:1;}
}
#ppr-card-inner .card-face{border-radius:14px;overflow:hidden;}
#ppr-card-front{
  position:absolute;inset:0;border-radius:14px;overflow:hidden;
  border:3px solid rgba(200,168,74,.6);
  box-shadow:0 12px 36px rgba(0,0,0,.9),0 0 0 1px rgba(200,168,74,.3),0 0 60px var(--pglow,rgba(200,168,74,.2));
}

/* prompt */
#ppr-prompt{z-index:2;text-align:center;font-size:clamp(9px,2dvh,12px);letter-spacing:2.5px;text-transform:uppercase;color:#c8a84a;opacity:.85;}
#ppr-sub{z-index:2;font-family:'IM Fell English',serif;font-style:italic;font-size:clamp(9px,2dvh,13px);color:rgba(232,220,200,.35);text-align:center;line-height:1.4;}

/* botões PPR */
#ppr-opts{z-index:2;display:flex;gap:clamp(8px,2.5vw,14px);}
.ppr-btn{
  width:clamp(76px,22vw,98px);border-radius:14px;
  border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:clamp(9px,2.3dvh,14px) 6px;cursor:pointer;position:relative;overflow:hidden;touch-action:manipulation;
  box-shadow:0 5px 14px rgba(0,0,0,.65);
  transition:transform .18s cubic-bezier(.34,1.56,.64,1),box-shadow .18s,border-color .18s,background .18s;
}
.ppr-btn::after{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:linear-gradient(180deg,rgba(255,255,255,.12),transparent);pointer-events:none;}
.ppr-btn:active{transform:scale(.87) translateY(4px)!important;}
.ppr-btn.chosen{border-color:rgba(200,168,74,.8)!important;box-shadow:0 6px 0 rgba(0,0,0,.4),0 0 0 2px rgba(200,168,74,.45),0 0 28px rgba(200,168,74,.22)!important;transform:translateY(-10px) scale(1.1)!important;background:rgba(200,168,74,.08)!important;}
.ppr-em{font-size:clamp(26px,6.5dvh,38px);line-height:1;filter:drop-shadow(0 2px 8px rgba(0,0,0,.7));}
.ppr-nm{font-family:'Cinzel',serif;font-size:clamp(7.5px,1.7vw,10px);font-weight:700;color:rgba(255,255,255,.65);}
.ppr-rule{font-size:clamp(5.5px,1.1vw,7px);color:rgba(255,255,255,.22);}
#ppr-go{z-index:2;font-family:'Cinzel',serif;font-size:clamp(11px,2.5dvh,15px);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border:none;border-radius:10px;padding:clamp(10px,2dvh,13px) clamp(26px,7vw,42px);cursor:pointer;position:relative;overflow:hidden;background:linear-gradient(160deg,#a08010,#5c4800);color:#f4e090;text-shadow:0 1px 4px rgba(0,0,0,.7);box-shadow:0 4px 0 rgba(0,0,0,.5),0 6px 18px rgba(0,0,0,.4);transition:transform .1s,box-shadow .1s,opacity .2s;}
#ppr-go::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.16),transparent 55%);pointer-events:none;}
#ppr-go:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.5);}
#ppr-go:disabled{opacity:.18;cursor:default;}

/* ═══════════════════════════════════════════════════
   GAME OVER
═══════════════════════════════════════════════════ */
#gameover{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.92);backdrop-filter:blur(10px);align-items:center;justify-content:center;}
#gameover.show{display:flex;}
#go-box{background:linear-gradient(160deg,#16100a,#0a0806);border:2px solid rgba(200,168,74,.4);border-radius:22px;padding:clamp(26px,5.5dvh,42px) clamp(22px,7vw,40px);text-align:center;max-width:300px;width:88%;box-shadow:0 0 0 1px rgba(200,168,74,.15),0 24px 60px rgba(0,0,0,.95),0 0 80px rgba(200,168,74,.05);position:relative;overflow:hidden;}
#go-box::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,rgba(200,168,74,.6),transparent);}
#go-trophy{font-size:clamp(42px,10dvh,60px);margin-bottom:6px;filter:drop-shadow(0 0 20px rgba(200,168,74,.4));}
#go-title{font-family:'Cinzel Decorative',serif;font-size:clamp(18px,4dvh,26px);color:#c8a84a;text-shadow:0 2px 0 #6a4a00,0 0 28px rgba(200,168,74,.4);margin-bottom:6px;}
#go-sub{font-family:'IM Fell English',serif;font-style:italic;font-size:clamp(11px,2.6vw,15px);color:rgba(232,220,200,.38);margin-bottom:22px;line-height:1.6;}
#go-restart{font-family:'Cinzel',serif;font-size:clamp(11px,2.6vw,14px);font-weight:700;letter-spacing:1px;background:linear-gradient(160deg,#c8a840,#7a6018);color:#1a1000;border:none;border-radius:10px;padding:11px 28px;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.4),0 0 18px rgba(200,168,74,.18);position:relative;overflow:hidden;transition:transform .1s,box-shadow .1s;}
#go-restart::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.24),transparent 50%);pointer-events:none;}
#go-restart:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.4);}
</style>
</head>
<body>

<div id="bg-base"></div>
<div id="bg-glow"></div>

<!-- HUD -->
<div id="hud">
  <div class="pb">
    <div class="pn c1">Jogador 1</div>
    <div class="player-hp-bar"><div class="player-hp-fill" id="php1" style="width:100%;background:linear-gradient(90deg,#2a6a9a,#7ecfff);"></div></div>
    <div class="php-count" id="phc1" style="color:#7ecfff"></div>
  </div>
  <div id="rd">
    <div id="rd-lbl">Rodada</div>
    <div id="rd-n">1</div>
    <div id="last-winner"></div>
  </div>
  <div class="pb r">
    <div class="pn c2">Jogador 2</div>
    <div class="player-hp-bar"><div class="player-hp-fill" id="php2" style="width:100%;background:linear-gradient(270deg,#9a2a2a,#ff8080);"></div></div>
    <div class="php-count" id="phc2" style="color:#ff8080"></div>
  </div>
</div>

<!-- ARENA -->
<div id="arena-wrap">
  <div id="arena">
    <div class="dz" id="dz1">
      <div class="dz-lbl" style="color:#7ecfff">J1</div>
      <div class="dz-icon">✦</div>
      <div class="dz-hint">Arraste aqui</div>
    </div>
    <div id="arena-vs"><span>VS</span></div>
    <div class="dz" id="dz2">
      <div class="dz-lbl" style="color:#ff8080">J2</div>
      <div class="dz-icon">✦</div>
      <div class="dz-hint">Arraste aqui</div>
    </div>
  </div>
</div>

<!-- IMPACT FLASH -->
<div id="arena-impact"></div>

<!-- AUTO-ADVANCE COUNTDOWN -->
<div id="auto-advance">
  <div id="auto-timer-arc">
    <svg viewBox="0 0 16 16">
      <circle cx="8" cy="8" r="7" id="auto-timer-circle" transform="rotate(-90 8 8)"/>
    </svg>

<!-- PASS -->

  <div id="ps-icon"></div>
  <div id="ps-who"></div>
  <div id="ps-msg">Passe o dispositivo e toque para ver sua mão</div>
  <button id="ps-btn" onclick="onPass()"></button>
</div>

<!-- PPR -->
<div id="ppr-screen">
  <div id="ppr-bg"></div>
  <div id="ppr-card-wrap">
    <div id="ppr-card-inner">
      <div class="card-face" id="ppr-card-front"></div>
    </div>
  </div>
  <div id="ppr-prompt"></div>
  <div id="ppr-sub">Pedra esmaga Tesoura · Papel cobre Pedra · Tesoura corta Papel</div>
  <div id="ppr-opts">
    <div class="ppr-btn" data-id="rock"     onclick="pickPPR(this)"><div class="ppr-em">🪨</div><div class="ppr-nm">Pedra</div><div class="ppr-rule">vence tesoura</div></div>
    <div class="ppr-btn" data-id="paper"    onclick="pickPPR(this)"><div class="ppr-em">📜</div><div class="ppr-nm">Papel</div><div class="ppr-rule">vence pedra</div></div>
    <div class="ppr-btn" data-id="scissors" onclick="pickPPR(this)"><div class="ppr-em">✂️</div><div class="ppr-nm">Tesoura</div><div class="ppr-rule">vence papel</div></div>
  </div>
  <button id="ppr-go" disabled onclick="confirmPPR()">Confirmar golpe</button>
</div>

<!-- GAME OVER -->
<div id="gameover">
  <div id="go-box">
    <div id="go-trophy"></div>
    <div id="go-title"></div>
    <div id="go-sub"></div>
    <button id="go-restart" onclick="init()">↺ Jogar novamente</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   CONSTANTES DE TEMA
═══════════════════════════════════════════════ */
const TH = {
  fire:{
    name:'Fogo', emoji:'🔥',
    vitral:'radial-gradient(ellipse 80% 65% at 50% 35%,#ff9050,#c43800 40%,#7a1000 72%,#1c0200)',
    portrait:'radial-gradient(ellipse at 50% 60%,#ff6020,#8b1a00 55%,#2a0500)',
    cray1:'rgba(255,140,40,.3)',
    border:'rgba(255,130,50,.7)',accent:'#ff8040',glow:'rgba(220,70,0,.6)',
    particle:'#ff6020',
    barColor:'linear-gradient(90deg,#8b1a00,#ff6020)',
    beats:['air','earth'],
  },
  water:{
    name:'Água', emoji:'💧',
    vitral:'radial-gradient(ellipse 80% 65% at 50% 35%,#70d8ff,#0088c8 40%,#003888 72%,#000e2c)',
    portrait:'radial-gradient(ellipse at 50% 60%,#0090d0,#003890 55%,#000c28)',
    cray1:'rgba(60,160,255,.3)',
    border:'rgba(70,170,255,.68)',accent:'#50b8f0',glow:'rgba(0,120,205,.6)',
    particle:'#40a0ff',
    barColor:'linear-gradient(90deg,#003080,#50b8f0)',
    beats:['fire','earth'],
  },
  earth:{
    name:'Terra', emoji:'🌍',
    vitral:'radial-gradient(ellipse 80% 65% at 50% 35%,#88e088,#2e9030 40%,#0e3a12 72%,#040e04)',
    portrait:'radial-gradient(ellipse at 50% 60%,#3a9a38,#0e3a10 55%,#040804)',
    cray1:'rgba(80,190,80,.3)',
    border:'rgba(70,180,70,.68)',accent:'#50b850',glow:'rgba(45,140,45,.6)',
    particle:'#60c060',
    barColor:'linear-gradient(90deg,#0e3a10,#50b850)',
    beats:['lightning','water'],
  },
  air:{
    name:'Ar', emoji:'🌪️',
    vitral:'radial-gradient(ellipse 80% 65% at 50% 35%,#dceeff,#6898c8 40%,#2c3e58 72%,#0c1622)',
    portrait:'radial-gradient(ellipse at 50% 60%,#6898c8,#2c3e58 55%,#0c1222)',
    cray1:'rgba(160,200,240,.3)',
    border:'rgba(150,190,235,.58)',accent:'#90b8d8',glow:'rgba(110,155,200,.45)',
    particle:'#b0d0f0',
    barColor:'linear-gradient(90deg,#2c3e58,#90b8d8)',
    beats:['fire','lightning'],
  },
  lightning:{
    name:'Elétrico', emoji:'⚡',
    vitral:'radial-gradient(ellipse 80% 65% at 50% 35%,#ffe870,#d09800 40%,#7e5a00 72%,#221600)',
    portrait:'radial-gradient(ellipse at 50% 60%,#d09800,#7e5a00 55%,#221400)',
    cray1:'rgba(255,210,50,.35)',
    border:'rgba(240,200,50,.72)',accent:'#e8b820',glow:'rgba(200,148,0,.65)',
    particle:'#ffe040',
    barColor:'linear-gradient(90deg,#7e5a00,#ffe040)',
    beats:['water','air'],
  },
};

/* ═══════════════════════════════════════════════
   VARIANTES — todas com 15 pontos de energia
   A energia É a vida. ATK + DEF = 15 sempre.
═══════════════════════════════════════════════ */
const BASE = {
  fire:      {atk:8, def:7},
  water:     {atk:5, def:10},
  earth:     {atk:4, def:11},
  air:       {atk:9, def:6},
  lightning: {atk:12,def:3},
};
/* variante redistribui: mesmo total, perfil diferente */
const VARIANTS = [
  {suffix:'Sentinela', da:-2, dd:+2},  /* mais defesa */
  {suffix:'Guerreiro', da: 0, dd: 0},  /* base */
  {suffix:'Assaltante',da:+2, dd:-2},  /* mais ataque */
];
const MAX_ENERGY = 15;
const PPR_BEATS = {rock:'scissors',paper:'rock',scissors:'paper'};
const PPR_EM    = {rock:'🪨',paper:'📜',scissors:'✂️'};

/* ═══════════════════════════════════════════════
   ESTADO
═══════════════════════════════════════════════ */
const $ = id => document.getElementById(id);
let p1Deck, p2Deck, p1Pick, p2Pick, p1PPR, p2PPR;
let phase, curPlayer, pprCb, roundNum;
let activePPRId = null;
let prevWinner1 = null, prevWinner2 = null; // ids das cartas que venceram a última rodada
let sparks = [], sparkTimer = null;
let dragging = null, dragCard = null, ghost = null;
let ghostW = 0, ghostH = 0;

/* ═══════════════════════════════════════════════
   DECK
═══════════════════════════════════════════════ */
function makeDeck(){
  return Object.keys(TH).map(eid=>{
    const v = VARIANTS[Math.floor(Math.random()*VARIANTS.length)];
    const b = BASE[eid];
    const atk = Math.max(1, b.atk + v.da);
    const def = Math.max(1, b.def + v.dd);
    return {id: eid+'_'+Math.random().toString(36).slice(2,6), eid, v:v.suffix, atk, def, energy: MAX_ENERGY, el: null};
  });
}

/* ═══════════════════════════════════════════════
   ENERGIA → barra graduada por threshold
═══════════════════════════════════════════════ */
function energyColor(pct){
  if(pct > .6) return 'linear-gradient(90deg,#1a8a2a,#52c46a)';
  if(pct > .35) return 'linear-gradient(90deg,#8a6a00,#f4c030)';
  return 'linear-gradient(90deg,#8a1a00,#f45050)';
}

/* ═══════════════════════════════════════════════
   PARTÍCULAS
═══════════════════════════════════════════════ */
function startSparks(eid){
  stopSparks();if(!eid)return;
  const col = TH[eid].particle;
  sparkTimer = setInterval(()=>{
    const p = document.createElement('div'); p.className='spark';
    const sz = 2+Math.random()*6, dx = (Math.random()-.5)*100;
    p.style.cssText=`width:${sz}px;height:${sz}px;background:${col};left:${8+Math.random()*84}%;--sx:${dx}px;animation-duration:${3+Math.random()*4}s;animation-delay:${Math.random()*.4}s;box-shadow:0 0 ${sz*2}px ${col};`;
    document.body.appendChild(p); sparks.push(p);
    setTimeout(()=>{p.remove();sparks=sparks.filter(x=>x!==p);},8000);
  },450);
}
function stopSparks(){clearInterval(sparkTimer);sparks.forEach(p=>p.remove());sparks=[];}

function setGlow(eid){
  $('bg-glow').style.background = eid
    ? `radial-gradient(ellipse at 50% 100%,${TH[eid].glow.replace('.6','.1')},transparent 65%)`
    : '';
}

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
function init(){
  p1Deck=makeDeck(); p2Deck=makeDeck();
  p1Pick=p2Pick=p1PPR=p2PPR=null;
  prevWinner1=prevWinner2=null;
  phase=null; roundNum=1; activePPRId=null;
  $('gameover').classList.remove('show');
  $('ppr-screen').classList.remove('show');
  $('pass-screen').classList.remove('show');
  stopSparks(); setGlow(null);
  updHud(); resetArena(); clearMain();
  showPass('p1');
}

/* ═══════════════════════════════════════════════
   HUD — barra de soma de energia total do deck
═══════════════════════════════════════════════ */
function deckTotalEnergy(deck){
  return deck.filter(c=>c.energy>0).reduce((s,c)=>s+c.energy,0);
}
function maxDeckEnergy(){ return 5 * MAX_ENERGY; }
function updHud(){
  $('rd-n').textContent = roundNum;
  const e1 = deckTotalEnergy(p1Deck), e2 = deckTotalEnergy(p2Deck);
  const max = maxDeckEnergy();
  $('php1').style.width = (e1/max*100)+'%';
  $('php2').style.width = (e2/max*100)+'%';
  $('phc1').textContent = `${p1Deck.filter(c=>c.energy>0).length} cartas`;
  $('phc2').textContent = `${p2Deck.filter(c=>c.energy>0).length} cartas`;
}

   ARENA
═══════════════════════════════════════════════ */
function resetArena(){
  dzEmpty('dz1','p1'); dzEmpty('dz2','p2');

}

    <div class="dz-lbl" style="color:${col}">${lbl}</div>
    <div class="dz-icon">✦</div>
    <div class="dz-hint">Arraste aqui</div>`;
}
function dzPlaced(id, player){

  const lbl = player==='p1'?'J1':'J2';
  const s=$(id); s.className='dz filled';

    <div class="dz-lbl" style="color:${col}">${lbl}</div>

function dzReveal(id, card, player, outcome){

/* ═══════════════════════════════════════════════
   PASS
═══════════════════════════════════════════════ */
function showPass(player){
  phase=player+'-pass';
  const p1=player==='p1';
  $('ps-icon').textContent = p1?'⚔️':'🛡️';
  $('ps-who').style.color  = p1?'#7ecfff':'#ff8080';

  $('ps-btn').style.cssText=`background:${gc};color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.8);`;
  $('ps-btn').textContent='👁 Ver minha mão';
  clearMain(); $('pass-screen').classList.add('show');
}
function onPass(){
  $('pass-screen').classList.remove('show');
  if(phase==='p1-pass')      startPick('p1');
  else if(phase==='p2-pass') startPick('p2');

}
function clearMain(){
  $('row-top').innerHTML=''; $('row-bot').innerHTML='';
  $('phase-msg').textContent='';
  const b=$('action-btn'); b.disabled=true; b.textContent=''; b.style='';

function startPick(player){
  phase=player+'-pick'; curPlayer=player;

              <div class="cf-portrait-bg"></div>
              <div class="cf-portrait-rays" style="--cray1:${th.cray1}"></div>
              <div class="cf-portrait-em"
                style="filter:drop-shadow(0 3px 14px rgba(0,0,0,.95)) drop-shadow(0 0 22px ${th.glow})"
              >${th.emoji}</div>
              <div class="cf-portrait-overlay"></div>
            </div>

            <div class="cf-type">
              <div class="cf-type-name">${card.v}</div>
              <div class="cf-type-el">${th.name}</div>
            </div>
            <!-- caixa de texto -->
            <div class="cf-textbox">
              <div class="cf-stats">
                <div class="cfst a"><div class="cfst-l">ATK</div><div class="cfst-v">${card.atk}</div></div>
                <div class="cfst d"><div class="cfst-l">DEF</div><div class="cfst-v">${card.def}</div></div>
              </div>

/* ═══════════════════════════════════════════════
   DRAG
═══════════════════════════════════════════════ */
function setupDrag(el, card){
  el.addEventListener('touchstart', e=>{e.preventDefault(); startDrag(el,card,e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  el.addEventListener('touchmove',  e=>{e.preventDefault(); if(dragging)moveDrag(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  el.addEventListener('touchend',   e=>{if(dragging)endDrag(e.changedTouches[0].clientX,e.changedTouches[0].clientY);});
  el.addEventListener('mousedown',  e=>{e.preventDefault(); startDrag(el,card,e.clientX,e.clientY);});
}
document.addEventListener('mousemove', e=>{if(dragging)moveDrag(e.clientX,e.clientY);});
document.addEventListener('mouseup',   e=>{if(dragging)endDrag(e.clientX,e.clientY);});

function startDrag(el, card, cx, cy){
  if(!phase||!phase.endsWith('-pick'))return;
  dragging=el; dragCard=card;
  el.classList.add('dragging');

  ghost=$('drag-ghost');
  ghost.innerHTML=el.outerHTML;
  const rect=el.getBoundingClientRect();
  ghostW=rect.width; ghostH=rect.height;
  ghost.style.width=ghostW+'px'; ghost.style.height=ghostH+'px';
  ghost.style.borderRadius='10px'; ghost.style.display='block';
  moveDrag(cx,cy);
  startSparks(card.eid); setGlow(card.eid);
  if(navigator.vibrate)navigator.vibrate(18);
}
function moveDrag(cx,cy){
  if(!ghost)return;
  ghost.style.left=(cx-ghostW/2)+'px';
  ghost.style.top =(cy-ghostH/2)+'px';
  const dzId=curPlayer==='p1'?'dz1':'dz2';
  const r=$(dzId).getBoundingClientRect();
  const over=cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom;
  $(dzId).style.borderColor=over?'rgba(200,168,74,.8)':'';
  $(dzId).style.background=over?'rgba(200,168,74,.06)':'';
  ghost.style.transform=over?'scale(1.07) rotate(2deg)':'scale(1) rotate(0)';
  ghost.style.transition='transform .18s';
}
function endDrag(cx,cy){
  if(!ghost||!dragging||!dragCard)return;
  ghost.style.display='none';
  dragging.classList.remove('dragging');
  dragging.style.opacity='';
  const dzId=curPlayer==='p1'?'dz1':'dz2';
  const r=$(dzId).getBoundingClientRect();
  const dropped=cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom;
  $(dzId).classList.remove('lit'); $(dzId).style.borderColor=''; $(dzId).style.background='';
  if(dropped) onDropped(dragCard);
  dragging=null; dragCard=null;
}

function onDropped(card){
  if(navigator.vibrate)navigator.vibrate([15,10,25]);
  const player=curPlayer;
  if(player==='p1'){
    p1Pick=card; dzPlaced('dz1','p1'); clearMain();
    showPPR('p1',card,()=>{stopSparks();setGlow(null);showPass('p2');});
  }else{
    p2Pick=card; dzPlaced('dz2','p2'); clearMain();
    showPPR('p2',card,()=>{stopSparks();setGlow(null);showRevealBtn();});
  }
}

function pickPPR(el){

/* Flutua número de dano sobre uma posição na tela */
function spawnDmgNumber(dmg, x, y, color, isWinner){
  if(dmg===0){
    // zero = cinza pequeno
    const el=document.createElement('div');
    el.className='dmg-float zero';
    el.textContent='0';
    el.style.left=x+'px'; el.style.top=y+'px';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1400);
    return;
  }
  // tamanho proporcional ao dano (6 → 16px base, 15 → 52px max)
  const size = Math.round(16 + (dmg/15)*40);
  const el=document.createElement('div');
  el.className='dmg-float';
  el.style.cssText=`
    left:${x-size}px;top:${y}px;
    font-size:${size}px;
    color:${color};
    text-shadow:0 0 ${size}px ${color},0 2px 8px rgba(0,0,0,.9);
    --dur:${1.4+dmg*.06}s;
  `;
  el.textContent=(isWinner?'':'-')+dmg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2000);
}

/* Drena energia de uma arena-card progressivamente */
function animateEnergyDrain(dzId, fromPct, toPct, duration){
  const fill = $(dzId).querySelector('.ac-energy-fill');
  if(!fill)return;
  fill.classList.add('draining');
  // pequeno delay para o browser registrar a classe antes de mudar width
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    fill.style.width = (Math.max(0,toPct)*100).toFixed(1)+'%';
    // cor muda conforme nível
    const col = toPct>0.6?'linear-gradient(90deg,#1a8a2a,#52c46a)'
               :toPct>0.35?'linear-gradient(90deg,#8a6a00,#f4c030)'
               :'linear-gradient(90deg,#8a1a00,#f45050)';
    fill.style.background = col;
  }));
}

/* Drena energia da carta na mão também (sincronia visual) */
function animateHandCardEnergy(cardId, newEnergy){
  const wrap=document.querySelector(`[data-cid="${cardId}"]`);
  if(!wrap)return;
  const fill=wrap.querySelector('.cf-energy-fill');
  const label=wrap.querySelector('.cf-energy-pts');
  if(fill){
    const pct=newEnergy/MAX_ENERGY;
    fill.classList.add('draining');
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      fill.style.width=(Math.max(0,pct)*100).toFixed(1)+'%';
      fill.style.background=energyColor(pct);
    }));
  }
  if(label)label.textContent=`${Math.max(0,newEnergy)}/${MAX_ENERGY}`;
}

/* Anima a carta da arena voltando para o deck (para a posição da carta na mão) */
function animateCardReturn(dzId, cardId, isWinner){
  const dz=$(dzId);
  const dzRect=dz.getBoundingClientRect();
  const handCard=document.querySelector(`[data-cid="${cardId}"]`);

  // cria cópia absoluta na posição do slot da arena
  const clone=dz.querySelector('.arena-card');
  if(!clone)return;

  const cloneRect=clone.getBoundingClientRect();
  const fixed=document.createElement('div');
  fixed.style.cssText=`
    position:fixed;z-index:200;pointer-events:none;
    left:${cloneRect.left}px;top:${cloneRect.top}px;
    width:${cloneRect.width}px;height:${cloneRect.height}px;
    border-radius:14px;overflow:hidden;
    border:1.5px solid rgba(200,168,74,.4);
    opacity:1;
  `;
  // clonar visual
  fixed.innerHTML=clone.outerHTML.replace('arena-card winner','arena-card').replace('arena-card loser','arena-card').replace('arena-card draw','arena-card');
  document.body.appendChild(fixed);

  // destino: posição da carta na mão (ou centro se já foi removida)
  let targetX=0, targetY=80;
  let rotEnd=isWinner?-15:25;
  if(handCard){
    const hr=handCard.getBoundingClientRect();
    targetX=(hr.left+hr.width/2)-(cloneRect.left+cloneRect.width/2);
    targetY=(hr.top+hr.height/2)-(cloneRect.top+cloneRect.height/2);
    rotEnd=isWinner?-8:15;
  }

  // delay pequeno, depois animar
  setTimeout(()=>{
    fixed.style.transition='all .6s cubic-bezier(.6,0,1,.8)';
    fixed.style.transform=`translate(${targetX}px,${targetY}px) scale(.15) rotate(${rotEnd}deg)`;
    fixed.style.opacity='0';
    setTimeout(()=>fixed.remove(),700);
  },200);
}

/* AUTO-AVANÇO */
let autoTimer=null,autoSkip=false;
function startAutoAdvance(delay, cb){
  clearAutoAdvance();
  autoSkip=false;
  const el=$('auto-advance');
  const circle=$('auto-timer-circle');
  el.classList.add('visible');
  circle.style.strokeDashoffset='44';
  circle.style.transition='none';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    circle.style.transition=`stroke-dashoffset ${delay/1000}s linear`;
    circle.style.strokeDashoffset='0';
  }));
  autoTimer=setTimeout(()=>{
    if(!autoSkip){ clearAutoAdvance(); cb(); }
  },delay);
}
function clearAutoAdvance(){
  clearTimeout(autoTimer);
  $('auto-advance').classList.remove('visible');
}
function skipAutoAdvance(){
  autoSkip=true;
  clearAutoAdvance();
  // executar callback imediatamente
  if(pendingAutoFn){ pendingAutoFn(); pendingAutoFn=null; }
}
let pendingAutoFn=null;

/* ═══════════════════════════════════════════════
   MOSTRAR BOTÃO REVELAR (agora sem botão "próxima rodada")
═══════════════════════════════════════════════ */
function showRevealBtn(){
  phase='reveal';
  $('phase-msg').style.color='#c8a84a';
  $('phase-msg').textContent='⚔ Prontos — revelar!';
  const b=$('action-btn');
  b.style.cssText='background:linear-gradient(160deg,#a08012,#5c4800);color:#f4e090;text-shadow:0 1px 4px rgba(0,0,0,.8);box-shadow:0 5px 0 rgba(0,0,0,.55),0 0 22px rgba(200,168,74,.3);opacity:1;pointer-events:auto;';
  b.textContent='⚡ Revelar cartas'; b.disabled=false; b.onclick=doReveal;
}

/* ═══════════════════════════════════════════════
   REVELAR — SEQUÊNCIA CINEMÁTICA
═══════════════════════════════════════════════ */
function doReveal(){
  const b=$('action-btn'); b.disabled=true; b.style.opacity='.3';

  const c1=p1Pick, c2=p2Pick;
  const p1bEl=c1.beats.includes(c2.eid), p2bEl=c2.beats.includes(c1.eid);
  const elB1=p1bEl?2:0, elB2=p2bEl?2:0;
  const p1wPPR=PPR_BEATS[p1PPR]===p2PPR, p2wPPR=PPR_BEATS[p2PPR]===p1PPR;
  const drawPPR=!p1wPPR&&!p2wPPR;

  // guardar energia antes do dano
  const oldE1=c1.energy, oldE2=c2.energy;

  let dmg1=0, dmg2=0;
  if(p1wPPR||drawPPR) dmg2=Math.max(0,(c1.atk+elB1)-c2.def);
  if(p2wPPR||drawPPR) dmg1=Math.max(0,(c2.atk+elB2)-c1.def);

  // aplicar dano
  c1.energy=Math.max(0,c1.energy-dmg1);
  c2.energy=Math.max(0,c2.energy-dmg2);

  let out1,out2;
  if(dmg2>dmg1){out1='winner';out2='loser'; prevWinner1=c1.id; prevWinner2=null;}
  else if(dmg1>dmg2){out1='loser';out2='winner'; prevWinner1=null; prevWinner2=c2.id;}
  else{out1='draw';out2='draw'; prevWinner1=null; prevWinner2=null;}

  // 1. Revelar as cartas na arena (com energia antiga = cheia ainda)
  c1.energy=oldE1; c2.energy=oldE2; // reverter temporário para mostrar energia cheia
  dzReveal('dz1',c1,'p1',out1);
  dzReveal('dz2',c2,'p2',out2);
  c1.energy=Math.max(0,oldE1-dmg1); // restaurar correto
  c2.energy=Math.max(0,oldE2-dmg2);

  // PPR label
  const pprLbl=p1PPR&&p2PPR?`${PPR_EM[p1PPR]} vs ${PPR_EM[p2PPR]} — ${p1wPPR?'J1 ataca':p2wPPR?'J2 ataca':'Troca mútua'}`:'';
  $('phase-msg').style.color='rgba(200,168,74,.55)';
  $('phase-msg').textContent=pprLbl;

  // 2. t=400ms — animação de colisão
  setTimeout(()=>{
    const winnerDz = out1==='winner'?'dz1':out2==='winner'?'dz2':null;
    const loserDz  = out1==='loser'?'dz1':out2==='loser'?'dz2':null;

    if(winnerDz&&loserDz){
      const wCard=$(winnerDz).querySelector('.arena-card');
      const lCard=$(loserDz).querySelector('.arena-card');
      if(wCard&&lCard){
        const wRect=wCard.getBoundingClientRect();
        const lRect=lCard.getBoundingClientRect();
        // direção do smash
        const dx=lRect.left-wRect.left;
        const smashX=dx>0?Math.min(dx*.55,50):-Math.min(Math.abs(dx)*.55,50);
        const smashR=dx>0?4:-4;
        wCard.style.setProperty('--smash-x',smashX+'px');
        wCard.style.setProperty('--smash-r',smashR+'deg');
        wCard.classList.add('smashing');

        // flash de impacto
        setTimeout(()=>{
          $('arena-impact').style.animation='none';
          $('arena-impact').offsetHeight;
          $('arena-impact').style.animation='arenaFlash .35s ease forwards';
          lCard.classList.add('hit-shake');
          if(navigator.vibrate)navigator.vibrate([30,10,15]);
        },200);
      }
    }else if(out1==='draw'){
      // empate — ambas tremem juntas
      [$('dz1'),$('dz2')].forEach(dz=>{
        const c=dz.querySelector('.arena-card');
        if(c)c.classList.add('hit-shake');
      });
    }
  },400);

  // 3. t=900ms — números de dano flutuam
  setTimeout(()=>{
    const th1=TH[c1.eid], th2=TH[c2.eid];
    const dz1r=$('dz1').getBoundingClientRect();
    const dz2r=$('dz2').getBoundingClientRect();
    // dano recebido em cada slot
    if(dmg1>0||out1==='loser'){
      spawnDmgNumber(dmg1,
        dz1r.left+dz1r.width/2,
        dz1r.top+dz1r.height/3,
        out1==='winner'?th1.accent:'#f45050',
        out1==='winner'
      );
    }
    if(dmg2>0||out2==='loser'){
      spawnDmgNumber(dmg2,
        dz2r.left+dz2r.width/2,
        dz2r.top+dz2r.height/3,
        out2==='winner'?th2.accent:'#f45050',
        out2==='winner'
      );
    }
  },900);

  // 4. t=1100ms — drenas de energia animadas nas arena-cards
  setTimeout(()=>{
    animateEnergyDrain('dz1', oldE1/MAX_ENERGY, c1.energy/MAX_ENERGY);
    animateEnergyDrain('dz2', oldE2/MAX_ENERGY, c2.energy/MAX_ENERGY);
    // sincroniza cartas na mão
    animateHandCardEnergy(c1.id, c1.energy);
    animateHandCardEnergy(c2.id, c2.energy);
  },1100);

  // 5. t=2000ms — indicador de vencedor + atualizar HUD
  setTimeout(()=>{
    const winLbl=out1==='winner'?'⚔ Jogador 1 venceu':out2==='winner'?'⚔ Jogador 2 venceu':'— Empate';
    $('last-winner').textContent=winLbl;
    updHud();
  },2000);

  // 6. t=2600ms — verificar mortes + animar retorno ao deck
  setTimeout(()=>{
    [c1,c2].forEach((c,i)=>{
      const dzId=i===0?'dz1':'dz2';
      const isWin=(i===0?out1:out2)==='winner';
      if(c.energy<=0){
        // carta morreu: anima saindo da arena (sem voltar ao deck — ela morre)
        const ac=$(dzId).querySelector('.arena-card');
        if(ac){
          ac.style.animation='cardDie .65s cubic-bezier(.4,0,1,1) forwards';
          setTimeout(()=>{
            // remove a carta do deck visual (já estava no deck só com opacity baixa)
            const hc=document.querySelector(`[data-cid="${c.id}"]`);
            if(hc){
              hc.style.transition='all .4s';
              hc.style.transform='scale(0) rotate(20deg)';
              hc.style.opacity='0';
              setTimeout(()=>hc.remove(),450);
            }
          },300);
        }
      }else{
        // carta sobreviveu: anima voltando do slot da arena pro deck
        animateCardReturn(dzId, c.id, isWin);
      }
    });
  },2600);

  // 7. verificar fim e auto-avançar
  setTimeout(()=>{
    const alive1=p1Deck.filter(c=>c.energy>0).length;
    const alive2=p2Deck.filter(c=>c.energy>0).length;
    const over=alive1===0||alive2===0;

    if(over){
      // game over — botão de resultado
      b.style.cssText='background:linear-gradient(160deg,#700,#300);color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.8);box-shadow:0 5px 0 rgba(0,0,0,.55);opacity:1;pointer-events:auto;';
      b.textContent='🏁 Ver resultado'; b.disabled=false; b.onclick=endGame;
    }else{
      // SEM BOTÃO — auto-avanço com countdown visual
      b.style.cssText='opacity:0;pointer-events:none;';
      const fn=()=>{phase='next'; roundNum++; updHud(); newRound();};
      pendingAutoFn=fn;
      startAutoAdvance(3200, fn);
    }
  },3200);
}

function newRound(){
  clearAutoAdvance();
  p1Pick=p2Pick=p1PPR=p2PPR=null;
  resetArena(); clearMain(); showPass('p1');
}

function endGame(){
  const a1=p1Deck.filter(c=>c.energy>0).length;
  const a2=p2Deck.filter(c=>c.energy>0).length;
  let trophy='🏆',title='',sub='';
  if(a1===0&&a2===0){trophy='🤝';title='Empate!';sub='Ambos os decks foram destruídos.';}
  else if(a2===0){title='Jogador 1 Venceu!';sub='Todas as cartas do oponente foram destruídas.';}
  else{title='Jogador 2 Venceu!';sub='Todas as cartas do oponente foram destruídas.';}
  $('go-trophy').textContent=trophy; $('go-title').textContent=title; $('go-sub').textContent=sub;
  $('gameover').classList.add('show'); stopSparks();
}

init();
</script>
