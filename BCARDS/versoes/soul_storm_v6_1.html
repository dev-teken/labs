<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>✦ SOUL STORM ✦ Yoshi's Land</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}

body{
  background:#f5ecd7;  /* pergaminho pastel — Yoshi's Island vibe */
  font-family:'Nunito',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── TEXTURA GIZÃO ── */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    /* bolinhas pontilhadas estilo crayon */
    radial-gradient(circle, rgba(255,180,200,.18) 1px, transparent 1px),
    radial-gradient(circle, rgba(160,220,255,.15) 1px, transparent 1px),
    radial-gradient(circle, rgba(255,240,120,.12) 1px, transparent 1px);
  background-size: 38px 38px, 55px 55px, 44px 44px;
  background-position: 0 0, 19px 19px, 9px 9px;
  pointer-events:none;z-index:0;
}

/* ────────── HEADER ────────── */
header{
  position:relative;z-index:10;
  padding:16px 20px 10px;
  text-align:center;
}

/* nuveizinhas decorativas do header */
.header-cloud{
  position:absolute;
  top:8px;
  pointer-events:none;
  opacity:.7;
}
.header-cloud.left { left:10px; }
.header-cloud.right{ right:10px; transform:scaleX(-1); }

.logo{
  font-family:'Fredoka One',cursive;
  font-size:clamp(1.8rem,5vw,3rem);
  letter-spacing:.08em;
  color:#2d1a5e;
  /* stroke estilo traço grosso */
  -webkit-text-stroke: 2.5px #2d1a5e;
  paint-order: stroke fill;
  background:linear-gradient(135deg,#ff7eb3,#ff9d2f 45%,#ffe44d);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(3px 3px 0 rgba(45,26,94,.3));
}
.tagline{
  font-size:.6rem;font-weight:900;letter-spacing:.24em;
  text-transform:uppercase;color:rgba(45,26,94,.4);margin-top:4px;
}

/* ── DOODLES FLUTUANDO ── */
.doodle-float{
  position:fixed;
  pointer-events:none;
  z-index:1;
  animation:doodle-bob var(--db,4s) ease-in-out infinite;
  animation-delay:var(--dd,0s);
  opacity:.55;
}
@keyframes doodle-bob{
  0%,100%{transform:translateY(0) rotate(var(--dr,0deg))}
  50%{transform:translateY(-12px) rotate(calc(var(--dr,0deg) + 8deg))}
}

/* ────────── GRID ────────── */
#grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
  padding:0 14px 48px;
  max-width:960px;
  margin:0 auto;
  position:relative;z-index:5;
}
@media(max-width:640px){#grid{grid-template-columns:repeat(2,1fr);gap:11px;padding:0 10px 32px}}
@media(max-width:360px){#grid{grid-template-columns:1fr}}

/* ────────── SOUL CARD ────────── */
.sc{
  position:relative;
  border-radius:24px;
  display:flex;
  flex-direction:column;
  --g:#fff;
  filter:drop-shadow(3px 4px 0 rgba(45,26,94,.22));
  transition:filter .2s;
}
.sc:hover{
  filter:drop-shadow(4px 6px 0 rgba(45,26,94,.32));
}

/* wrapper do canvas */
.sc-wrap{
  position:relative;
  aspect-ratio:3/4;
  border-radius:22px 22px 0 0;
  overflow:hidden;
  /* borda grossa estilo crayon */
  border:3.5px solid #2d1a5e;
  border-bottom:none;
  cursor:pointer;
  transition:box-shadow .3s;
  background:#020208;
}
.sc:hover .sc-wrap{
  box-shadow:0 0 0 2px var(--g), 0 0 18px var(--g);
}
.sc-canvas{display:block;width:100%;height:100%}

/* ── CAMADA ILUSTRADA SVG ── */
.sc-illustration{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:4;
  /* mix-blend-mode garante que o smoke apareça por baixo */
  mix-blend-mode: normal;
}
/* mascote posicionado no centro-baixo do canvas */
.sc-mascot{
  position:absolute;
  bottom:38px;
  left:50%;
  transform:translateX(-50%);
  z-index:5;
  pointer-events:none;
  animation:mascot-idle var(--mi,3.2s) ease-in-out infinite;
  filter:drop-shadow(0 4px 0 rgba(0,0,0,.35));
}
@keyframes mascot-idle{
  0%,100%{transform:translateX(-50%) translateY(0) rotate(-2deg) scale(1)}
  30%{transform:translateX(-50%) translateY(-6px) rotate(3deg) scale(1.04)}
  60%{transform:translateX(-50%) translateY(-2px) rotate(-1deg) scale(1.01)}
}

/* starzinhas e detalhes no canto */
.sc-corner-deco{
  position:absolute;
  top:8px;left:8px;
  z-index:6;
  pointer-events:none;
  animation:corner-spin 6s linear infinite;
}
@keyframes corner-spin{
  0%,100%{transform:rotate(-10deg) scale(1)}
  50%{transform:rotate(10deg) scale(1.15)}
}

/* ── rune flutuante ── */
.sc-rune{
  position:absolute;top:8px;right:10px;font-size:1.2rem;
  filter:drop-shadow(0 0 6px var(--g));
  animation:rf 3.2s ease-in-out infinite;
  pointer-events:none;z-index:7;
}
@keyframes rf{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-8px) rotate(6deg)}}

/* mana badge */
.sc-mana{
  position:absolute;top:-10px;left:-10px;
  width:30px;height:30px;border-radius:50%;
  background:linear-gradient(135deg,#3a7fff,#9b2fff);
  border:3px solid #fff;box-shadow:0 3px 0 #2d1a5e;
  display:flex;align-items:center;justify-content:center;
  font-family:'Fredoka One',cursive;font-size:.82rem;color:#fff;
  z-index:8;
}

/* label overlay */
.sc-label{
  position:absolute;bottom:0;left:0;right:0;
  padding:28px 10px 8px;
  background:linear-gradient(to top,rgba(0,0,0,.88) 0%,transparent 100%);
  text-align:center;pointer-events:none;z-index:6;
}
.sc-name{
  font-family:'Fredoka One',cursive;
  font-size:clamp(.78rem,1.8vw,1rem);
  letter-spacing:.1em;text-transform:uppercase;
  color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.6), 0 0 10px var(--g);
}
.sc-vibe{
  font-size:.5rem;font-weight:800;letter-spacing:.14em;
  text-transform:uppercase;color:rgba(255,255,255,.35);
  margin-top:1px;
}

/* ────────── PAINEL ────────── */
.sc-panel{
  background:#fff;
  border:3.5px solid #2d1a5e;
  border-top:none;
  border-radius:0 0 20px 20px;
  padding:10px 11px 14px;
  display:flex;
  flex-direction:column;
  gap:8px;
  position:relative;
  /* detalhe de pontilhado estilo Yoshi */
  box-shadow:0 4px 0 #2d1a5e;
}
/* faixa de cor no topo do painel */
.sc-panel::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:4px;
  background:var(--stripe, linear-gradient(90deg,#ff7eb3,#ffe44d));
  border-radius:0;
}

/* ── TABS ── */
.sc-tabs{
  display:flex;gap:4px;
  background:rgba(45,26,94,.07);
  border-radius:12px;padding:3px;
}
.sc-tab{
  flex:1;
  font-family:'Fredoka One',cursive;
  font-size:clamp(.56rem,1.5vw,.66rem);
  letter-spacing:.05em;text-transform:uppercase;
  color:rgba(45,26,94,.45);
  text-align:center;padding:5px 2px;
  border-radius:10px;cursor:pointer;
  transition:background .2s, color .2s, box-shadow .2s;
  white-space:nowrap;
}
.sc-tab.active{
  background:var(--tab-c, #ff7eb3);
  color:#fff;
  box-shadow:0 3px 0 rgba(45,26,94,.25);
}

/* ── SWITCHES ── */
.sc-switches{display:flex;flex-direction:column;gap:6px}
.sw-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 9px;
  border-radius:12px;
  border:2.5px solid rgba(45,26,94,.1);
  background:rgba(45,26,94,.04);
  cursor:pointer;
  transition:background .18s, border-color .18s, transform .1s;
  gap:6px;
}
.sw-row:active{transform:scale(.95)}
.sw-row.on{
  background:rgba(45,26,94,.08);
  border-color:var(--sw-c, rgba(45,26,94,.3));
  box-shadow:0 2px 0 rgba(45,26,94,.15);
}
.sw-left{display:flex;align-items:center;gap:7px}
.sw-em{
  font-size:1.05rem;line-height:1;
  transition:transform .25s;
}
.sw-row.on .sw-em{transform:scale(1.35) rotate(-8deg);animation:swbounce .3s ease}
@keyframes swbounce{0%{transform:scale(1)}50%{transform:scale(1.6) rotate(-12deg)}100%{transform:scale(1.35) rotate(-8deg)}}
.sw-nome{
  font-family:'Fredoka One',cursive;
  font-size:clamp(.62rem,1.6vw,.74rem);
  letter-spacing:.02em;
  color:rgba(45,26,94,.75);
}

/* toggle pill */
.sw-pill{
  width:40px;height:22px;flex-shrink:0;
  border-radius:12px;
  background:rgba(45,26,94,.12);
  border:2px solid rgba(45,26,94,.2);
  position:relative;
  transition:background .28s, border-color .28s, box-shadow .28s;
}
.sw-pill::after{
  content:'';
  position:absolute;top:2px;left:2px;
  width:14px;height:14px;border-radius:50%;
  background:rgba(45,26,94,.3);
  transition:transform .28s cubic-bezier(.34,1.56,.64,1), background .25s;
  box-shadow:0 2px 0 rgba(45,26,94,.2);
}
.sw-row.on .sw-pill{
  background:var(--sw-c,#ff7eb3);
  border-color:rgba(45,26,94,.4);
  box-shadow:0 2px 0 rgba(45,26,94,.2);
}
.sw-row.on .sw-pill::after{
  transform:translateX(18px);
  background:#fff;
  box-shadow:0 2px 0 rgba(45,26,94,.2);
}

/* ── BARRA ── */
.sc-bar{display:flex;flex-direction:column;gap:7px}
.sc-bar-top{display:flex;align-items:center;justify-content:space-between}
.sc-bar-label{
  font-family:'Fredoka One',cursive;
  font-size:.63rem;letter-spacing:.1em;text-transform:uppercase;
  color:rgba(45,26,94,.4);
}
.sc-bar-value{
  font-family:'Fredoka One',cursive;
  font-size:.82rem;color:#2d1a5e;
  min-width:42px;text-align:right;
}
.sc-track{
  position:relative;height:12px;border-radius:8px;
  background:rgba(45,26,94,.1);
  border:2.5px solid rgba(45,26,94,.2);
  cursor:pointer;overflow:visible;
  box-shadow:inset 0 2px 4px rgba(45,26,94,.1);
}
.sc-fill{
  position:absolute;top:0;left:0;bottom:0;
  border-radius:6px;
  transition:width .07s linear;
}
.sc-thumb{
  position:absolute;top:50%;
  width:22px;height:22px;border-radius:50%;
  background:#fff;border:3px solid var(--g);
  box-shadow:0 3px 0 rgba(45,26,94,.3),0 0 10px var(--g);
  transform:translate(-50%,-50%);
  transition:left .07s linear;
  pointer-events:none;
}
.sc-stage{
  font-family:'Fredoka One',cursive;
  font-size:.62rem;letter-spacing:.08em;
  text-align:center;min-height:1em;
  color:rgba(45,26,94,.5);
}

/* ── SPARKLE ── */
.sparkle{
  position:absolute;pointer-events:none;border-radius:50%;
  width:6px;height:6px;
  animation:sp .55s ease-out forwards;z-index:20;
}
@keyframes sp{
  0%{transform:translate(0,0) scale(1);opacity:1}
  100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}
}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(90px);
  background:#fff;
  color:#2d1a5e;
  font-family:'Fredoka One',cursive;font-size:.9rem;
  padding:9px 22px;border-radius:40px;
  border:3px solid #2d1a5e;
  box-shadow:3px 4px 0 #2d1a5e;
  transition:transform .32s cubic-bezier(.34,1.56,.64,1);
  z-index:999;white-space:nowrap;pointer-events:none;
}
#toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

function n2(t,f,p){
  return .42*Math.sin(t*f+p)+.28*Math.sin(t*f*1.618+p*1.3)
        +.18*Math.sin(t*f*2.618+p*2.1)+.12*Math.sin(t*f*4.236+p*3.4);
}
function hsl2rgb(h,s,l){
  s/=100;l/=100;const a=s*Math.min(l,1-l);
  const f=(n,k=(n+h/30)%12)=>l-a*Math.max(Math.min(k-3,9-k,1),-1);
  return[Math.round(f(0)*255),Math.round(f(8)*255),Math.round(f(4)*255)];
}
function breathwave(s){const ph=(performance.now()%s.bperiod)/s.bperiod;return .5-.5*Math.cos(ph*Math.PI*2);}
function heartbeat(s){
  const bpm=62*(s.speed/.011),period=60000/bpm;
  const ph=(performance.now()%period)/period;
  const g=(x,m,sg)=>Math.exp(-.5*((x-m)/sg)**2);
  return Math.max(0,g(ph,.1,.045)+g(ph,.22,.055)*.58);
}

  if(sw['stars'])  {halo+=1.2;density+=.8;}
  if(sw['dust'])   {turbulence+=2.0;drift+=.8;}

  const om=1+.09*BW*centrifugal;
  oc.clearRect(0,0,W,H);oc.save();

      const fi=i/5,fdx=pSz*.45*n2(t,.31+i*.07,p.s*.9+i*1.1),fdy=pSz*.38*n2(t,.29+i*.05,p.s*1.7+i*.9);
      const fr=pSz*(.55-fi*.25),fa=p.al*density*(1-Math.pow(fi,.5+dissipation*.6)*.72)*(1+.22*HB);
      oc.save();oc.translate(cx+ox,cy+oy);oc.rotate(rot);oc.scale(sx,sy);
      const g=oc.createRadialGradient(fdx,fdy,0,fdx,fdy,fr);
      const[r,gv,b]=p.col,rl=Math.min(r+Math.round(55*halo),255),gl=Math.min(gv+Math.round(55*halo),255),bl=Math.min(b+Math.round(55*halo),255);
      g.addColorStop(0,`rgba(${r},${gv},${b},${Math.min(fa,.95)})`);
      g.addColorStop(.2,`rgba(${rl},${gl},${bl},${fa*.6*Math.min(halo,1.8)})`);
      g.addColorStop(.5,`rgba(${r},${gv},${b},${fa*.25})`);
      g.addColorStop(1,`rgba(${r},${gv},${b},0)`);
      oc.fillStyle=g;oc.beginPath();oc.arc(fdx,fdy,fr,0,Math.PI*2);oc.fill();oc.restore();
    }
  });
  if(turbulence>.1){
    const nv=Math.round(2+turbulence*3.5);
    for(let k=0;k<nv;k++){
      const ka=k*(Math.PI*2/nv)+t*.03,kn=n2(t,.07+k*.03,k*2.3);
      const tx1=cx+R*.7*Math.cos(ka)*kn,ty1=cy+R*.7*Math.sin(ka)*kn;
      const vr=R*(.06+.07*turbulence)*(.6+.4*Math.abs(kn));
      const[r,gv,b]=bRGB;
      const vg=oc.createRadialGradient(tx1,ty1,0,tx1,ty1,vr);
      vg.addColorStop(0,`rgba(${r},${gv},${b},${.1*turbulence*(1+HB*.5)})`);
      vg.addColorStop(1,`rgba(${r},${gv},${b},0)`);
      oc.fillStyle=vg;oc.beginPath();oc.arc(tx1,ty1,vr,0,Math.PI*2);oc.fill();
    }
  }
  oc.globalCompositeOperation='screen';
  const lx=cx+Math.cos(t*.45+1)*R*.3,ly=cy+Math.sin(t*.55+.5)*R*.26;
  const sh=oc.createRadialGradient(lx,ly,0,lx,ly,R*(.22+iv*.18+halo*.06));
  const[r,gv,b]=hsl2rgb(soul.h,48,82);
  sh.addColorStop(0,`rgba(${r},${gv},${b},${.18+BW*.07+HB*.05+iv*.2})`);
  sh.addColorStop(.5,`rgba(${r},${gv},${b},.05)`);
  sh.addColorStop(1,'rgba(0,0,0,0)');
  oc.fillStyle=sh;oc.fillRect(0,0,W,H);
  oc.globalCompositeOperation='source-over';
  const vg2=oc.createRadialGradient(cx,cy,R*.25,cx,cy,R);
  vg2.addColorStop(0,'rgba(0,0,0,0)');
  vg2.addColorStop(.6,`rgba(1,1,7,${.52-iv*.22})`);
  vg2.addColorStop(1,`rgba(1,1,9,${.9-iv*.2})`);
  oc.fillStyle=vg2;oc.fillRect(0,0,W,H);

  /* FX */
  oc.save();oc.beginPath();oc.arc(cx,cy,R,0,Math.PI*2);oc.clip();
  oc.globalCompositeOperation='screen';
  const fx=soul.fx;
  const fxB=Object.values(sw).filter(Boolean).length*.25;
  if(fx==='trail'||sw['orbit']){
    const count=Math.round(4+(iv+fxB)*12);
    for(let i=0;i<count;i++){
      const a=t*.3+i*(Math.PI*2/count),rr=R*(.28+iv*.18)+R*.08*Math.sin(t*.7+i);
      const x=cx+Math.cos(a)*rr,y=cy+Math.sin(a)*rr*.8,sz=R*(.04+iv*.05+fxB*.03);
      const gs=oc.createRadialGradient(x,y,0,x,y,sz);
      gs.addColorStop(0,`rgba(${bRGB[0]},${bRGB[1]},${bRGB[2]},${.12+(iv+fxB)*.28})`);
      gs.addColorStop(1,'rgba(0,0,0,0)');
      oc.fillStyle=gs;oc.beginPath();oc.arc(x,y,sz,0,Math.PI*2);oc.fill();
    }
  }
  if(fx==='pulse'){
    const rings=Math.round(1+(iv+fxB)*5);
    for(let i=0;i<rings;i++){
      const ph=((performance.now()/(2200-iv*1200))+i/rings)%1;
      const pr2=ph*R*.9,al=(1-ph)*(.14+(iv+fxB)*.24)*(1+HB*.4);
      oc.globalAlpha=al;oc.strokeStyle=`rgba(${a3[0]},${a3[1]},${a3[2]},1)`;
      oc.lineWidth=1+(iv+fxB)*2.5;oc.beginPath();oc.arc(cx,cy,pr2,0,Math.PI*2);oc.stroke();
    }
    oc.globalAlpha=1;
  }
  if(fx==='orbit'||sw['orbit']){
    const count=Math.round(3+(iv+fxB)*10);
    for(let i=0;i<count;i++){
      const angle=t*(1+(iv+fxB)*2)+i*(Math.PI*2/count),orr=R*(.25+iv*.22),ex=.6+(iv+fxB)*.35;
      const ox2=cx+Math.cos(angle)*orr,oy2=cy+Math.sin(angle)*orr*ex,sz=R*(.025+(iv+fxB)*.03);
      const gs=oc.createRadialGradient(ox2,oy2,0,ox2,oy2,sz);
      gs.addColorStop(0,`rgba(205,158,74,${.7+(iv+fxB)*.25})`);gs.addColorStop(1,'rgba(0,0,0,0)');
      oc.fillStyle=gs;oc.beginPath();oc.arc(ox2,oy2,sz,0,Math.PI*2);oc.fill();
    }
  }
  if(fx==='stars'||sw['stars']){
    const count=Math.round(6+(iv+fxB)*28);
    for(let i=0;i<count;i++){
      const sx2=cx+Math.sin(i*137.5)*R*.44,sy2=cy+Math.cos(i*97.3)*R*.4;
      const al=(.1+(iv+fxB)*.6)*(.5+.5*Math.sin(t*(1+iv)+i*1.7)),sz=R*(.012+(iv+fxB)*.022);
      const gs=oc.createRadialGradient(sx2,sy2,0,sx2,sy2,sz);
      gs.addColorStop(0,`rgba(255,255,255,${al})`);gs.addColorStop(1,'rgba(0,0,0,0)');
      oc.fillStyle=gs;oc.beginPath();oc.arc(sx2,sy2,sz,0,Math.PI*2);oc.fill();
    }
    if((iv+fxB)>.5){
      const burst=Math.round(((iv+fxB)-.5)/.5*8);
      for(let i=0;i<burst;i++){
        const bx=cx+Math.sin(i*83.7+t*.5)*R*.35,by=cy+Math.cos(i*61.3+t*.4)*R*.3;
        const al=((iv+fxB)-.5)/.5*.8;
        for(let arm=0;arm<4;arm++){
          const ax=Math.cos(arm*Math.PI/2+t*.3)*R*.07,ay=Math.sin(arm*Math.PI/2+t*.3)*R*.07;
          const lg=oc.createLinearGradient(bx,by,bx+ax,by+ay);
          lg.addColorStop(0,`rgba(255,255,255,${al})`);lg.addColorStop(1,'rgba(255,255,255,0)');
          oc.strokeStyle=lg;oc.lineWidth=1.5;oc.beginPath();oc.moveTo(bx,by);oc.lineTo(bx+ax,by+ay);oc.stroke();
        }
      }
    }
  }
  if(fx==='dust'||sw['dust']){
    const count=Math.round(6+(iv+fxB)*22);
    for(let i=0;i<count;i++){
      const spd=300+(iv+fxB)*1400,dx=Math.sin(i*73.1+t*(iv*.8))*R*(.3+iv*.18);
      const dy=((performance.now()/spd+i*40)%H)-H/2,sz=R*(.012+(iv+fxB)*.02),al=.08+(iv+fxB)*.18;
      const gs=oc.createRadialGradient(cx+dx,cy+dy,0,cx+dx,cy+dy,sz);
      gs.addColorStop(0,`rgba(200,180,100,${al})`);gs.addColorStop(1,'rgba(0,0,0,0)');
      oc.fillStyle=gs;oc.beginPath();oc.arc(cx+dx,cy+dy,sz,0,Math.PI*2);oc.fill();
    }
  }
  if(fx==='aurora'||sw['aurora']){
    const hues=[320,160,200,290,350,120];
    const count=Math.round(2+(iv+fxB)*5);
    for(let i=0;i<count;i++){
      const y1=cy+Math.sin(t*.4+i*1.3)*R*(.2+(iv+fxB)*.22);
      const x1=cx-R*.9+(i/count)*R*1.8,x2=x1+R*.45;
      const rgb=hsl2rgb(hues[i%hues.length],60+iv*20,65+iv*15);
      const g2=oc.createLinearGradient(x1,y1,x2,y1+R*.24);
      const a2=.07+(iv+fxB)*.18;
      g2.addColorStop(0,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0)`);
      g2.addColorStop(.5,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},${a2})`);
      g2.addColorStop(1,`rgba(${rgb[0]},${rgb[1]},${rgb[2]},0)`);
      oc.fillStyle=g2;
      oc.beginPath();oc.moveTo(x1,y1);oc.bezierCurveTo(x1+R*.1,y1-R*.1,x2-R*.1,y1+R*.1,x2,y1+R*.24);
      oc.lineTo(x2,y1+R*.3);oc.bezierCurveTo(x2,y1+R*.14,x1,y1+R*.06,x1,y1+R*.3);oc.closePath();oc.fill();
    }
  }
  oc.restore();oc.restore();
}

/* ═════════════════════════════════════════
   BUILD CARDS
═════════════════════════════════════════ */
const cvs_map={}, off_map={}, refs={};

function buildCards(){
  const grid=document.getElementById('grid');
  SOULS.forEach(soul=>{
    const sc=document.createElement('div');
    sc.className='sc';
    sc.style.setProperty('--g', soul.glow);

    /* CANVAS WRAP */
    const wrap=document.createElement('div');
    wrap.className='sc-wrap';
    wrap.style.setProperty('--g', soul.glow);

    const cv=document.createElement('canvas');cv.className='sc-canvas';
    cvs_map[soul.id]=cv;
    const off=document.createElement('canvas');
    off_map[soul.id]={canvas:off,ctx:off.getContext('2d')};

    /* MASCOTE SVG ilustrado */
    const mascot=document.createElement('div');
    mascot.className='sc-mascot';
    mascot.style.setProperty('--mi', (.8+soul.speed*40).toFixed(1)+'s');
    mascot.innerHTML=MASCOTS[soul.id]||'';

    /* deco de canto */
    const corner=document.createElement('div');
    corner.className='sc-corner-deco';
    corner.innerHTML=CORNER_DECOS[soul.id]||'';

    /* rune */
    const rune=document.createElement('div');
    rune.className='sc-rune';rune.textContent=soul.rune;
    rune.style.animationDelay=(Math.random()*2.5)+'s';

    /* mana */
    const mana=document.createElement('div');mana.className='sc-mana';mana.textContent=soul.mana;

    /* label */
    const lbl=document.createElement('div');lbl.className='sc-label';
    lbl.innerHTML=`<div class="sc-name">${soul.label}</div><div class="sc-vibe">${soul.vibe}</div>`;

    wrap.append(cv, mascot, corner, rune, mana, lbl);

    /* click = sparkle */
    wrap.addEventListener('click',e=>{sparkle(wrap,e);toast(soul.rune+' '+soul.label);});
    wrap.addEventListener('mousemove',e=>tilt(wrap,e));
    wrap.addEventListener('mouseleave',()=>{wrap.style.transform='';});

    /* PAINEL */
    const panel=document.createElement('div');
    panel.className='sc-panel';
    panel.style.setProperty('--stripe', STRIPES[soul.id]);

    /* TABS */
    const tabs=document.createElement('div');tabs.className='sc-tabs';
    const tabSw=document.createElement('div');tabSw.className='sc-tab active';
    tabSw.style.setProperty('--tab-c', TAB_COLORS[soul.id]);
    tabSw.textContent='⚡ Poderes';
    const tabBar=document.createElement('div');tabBar.className='sc-tab';
    tabBar.style.setProperty('--tab-c', TAB_COLORS[soul.id]);
    tabBar.textContent='🎚️ Força';
    tabs.append(tabSw,tabBar);

    /* SWITCHES */
    const swPanel=document.createElement('div');swPanel.className='sc-switches';
    soul.switches.forEach(swDef=>{
      const row=document.createElement('div');
      row.className='sw-row';
      row.id=`sw_${soul.id}_${swDef.key}`;
      row.style.setProperty('--sw-c', swDef.c);
      row.innerHTML=`<div class="sw-left"><span class="sw-em">${swDef.em}</span><span class="sw-nome">${swDef.nome}</span></div><div class="sw-pill"></div>`;
      row.addEventListener('click',()=>{
        SW[soul.id][swDef.key]=!SW[soul.id][swDef.key];
        row.classList.toggle('on',SW[soul.id][swDef.key]);
        if(navigator.vibrate) navigator.vibrate(SW[soul.id][swDef.key]?[30]:[15]);
        toast(swDef.em+' '+(SW[soul.id][swDef.key]?swDef.nome+' ON!':swDef.nome+' off'));
      });
      swPanel.appendChild(row);
    });

    /* BAR */
    const barPanel=document.createElement('div');barPanel.className='sc-bar';barPanel.style.display='none';
    const barTop=document.createElement('div');barTop.className='sc-bar-top';
    const barLabel=document.createElement('div');barLabel.className='sc-bar-label';barLabel.textContent='INTENSIDADE';
    const barValue=document.createElement('div');barValue.className='sc-bar-value';barValue.style.color=TAB_COLORS[soul.id];
    barTop.append(barLabel,barValue);
    const track=document.createElement('div');track.className='sc-track';track.style.setProperty('--g',soul.glowHex);
    const fill=document.createElement('div');fill.className='sc-fill';
    fill.style.background=`linear-gradient(90deg,${soul.glowHex}88,${soul.glowHex})`;
    const thumb=document.createElement('div');thumb.className='sc-thumb';thumb.style.setProperty('--g',soul.glowHex);
    track.append(fill,thumb);
    const stageEl=document.createElement('div');stageEl.className='sc-stage';stageEl.style.color=TAB_COLORS[soul.id];
    barPanel.append(barTop,track,stageEl);

    refs[soul.id]={wrap,fill,thumb,stageEl,barValue};

    /* TAB LOGIC */
    function setTab(t){
      TAB[soul.id]=t;
      tabSw.classList.toggle('active',t==='sw');
      tabBar.classList.toggle('active',t==='bar');
      swPanel.style.display=t==='sw'?'flex':'none';
      barPanel.style.display=t==='bar'?'flex':'none';
    }
    tabSw.addEventListener('click',()=>setTab('sw'));
    tabBar.addEventListener('click',()=>setTab('bar'));
    setTab('sw');

    /* DRAG */
    let dragging=false;
    function setFromEvent(e){
      const rect=track.getBoundingClientRect();
      const clientX=e.touches?e.touches[0].clientX:e.clientX;
      INT[soul.id]=Math.max(0,Math.min(1,(clientX-rect.left)/rect.width));
      updateBar(soul.id);
    }
    track.addEventListener('mousedown',e=>{dragging=true;setFromEvent(e);e.preventDefault();});
    track.addEventListener('touchstart',e=>{dragging=true;setFromEvent(e);},{passive:true});
    window.addEventListener('mousemove',e=>{if(dragging)setFromEvent(e);});
    window.addEventListener('touchmove',e=>{if(dragging)setFromEvent(e);},{passive:true});
    window.addEventListener('mouseup',()=>dragging=false);
    window.addEventListener('touchend',()=>dragging=false);

    panel.append(tabs,swPanel,barPanel);
    sc.append(wrap,panel);
    grid.appendChild(sc);
    updateBar(soul.id);
  });
}

function updateBar(id){
  const soul=SOULS.find(s=>s.id===id);
  const iv=INT[id],pct=iv*100,r=refs[id];
  r.fill.style.width=pct+'%';r.thumb.style.left=pct+'%';
  const si=Math.min(Math.floor(iv*soul.stages.length),soul.stages.length-1);
  r.stageEl.textContent=soul.stages[si].toUpperCase();
  r.barValue.textContent=Math.round(pct)+'%';
  r.wrap.style.boxShadow=iv>.05?`0 0 ${8+iv*32}px ${soul.glow}, 0 8px 24px rgba(0,0,0,.6)`:'';
  r.wrap.style.borderColor=iv>.05?soul.glowHex:'#2d1a5e';
}

/* ═════════════════════════════════════════
   INTERAÇÕES
═════════════════════════════════════════ */
function tilt(el,e){
  const rect=el.getBoundingClientRect();
  const x=(e.clientX-rect.left)/rect.width-.5,y=(e.clientY-rect.top)/rect.height-.5;
  el.style.transform=`perspective(500px) rotateX(${y*-12}deg) rotateY(${x*12}deg)`;
}
function sparkle(el,e){
  const rect=el.getBoundingClientRect();
  const cx=e.clientX-rect.left,cy=e.clientY-rect.top;
  const cols=['#FFD426','#FF3FA0','#00D4FF','#C040FF','#39FF14','#FF6B00','#ffe44d','#ff7eb3','#a8e6cf'];
  for(let i=0;i<14;i++){
    const sp=document.createElement('div');sp.className='sparkle';
    const a=Math.random()*Math.PI*2,d=20+Math.random()*55;
    sp.style.cssText=`left:${cx}px;top:${cy}px;background:${cols[i%cols.length]};--dx:${Math.cos(a)*d}px;--dy:${Math.sin(a)*d}px;border-radius:${Math.random()>.5?'50%':'3px'}`;
    el.appendChild(sp);sp.addEventListener('animationend',()=>sp.remove());
  }
}
let toastT;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent='🌟 '+msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1700);
}

/* ═════════════════════════════════════════
   LOOP
═════════════════════════════════════════ */
function loop(){
  SOULS.forEach(soul=>{
    const iv=INT[soul.id];
    const swCount=Object.values(SW[soul.id]).filter(Boolean).length;
    T[soul.id]+=soul.speed*(.4+iv*3+swCount*.4);
    const cv=cvs_map[soul.id];if(!cv)return;
    const W=cv.clientWidth||120,H=cv.clientHeight||160;
    if(cv.width!==W||cv.height!==H){cv.width=W;cv.height=H;}
    const o=off_map[soul.id];o.canvas.width=W;o.canvas.height=H;
    drawSmoke(o.ctx,soul,W,H,iv);
    cv.getContext('2d').drawImage(o.canvas,0,0);
  });
  requestAnimationFrame(loop);
}

buildCards();
loop();
</script>
