<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Soul Grid - Liquid High Luminance</title>
<style>
    body { background: #000; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    
    .grid { 
        display: grid; 
        grid-template-columns: repeat(3, 1fr); 
        gap: 30px; 
        /* O filtro de contraste no container pai cria a fusão líquida */
        filter: contrast(25) brightness(1.1) saturate(1.4);
    }

    .soul-card { display: flex; flex-direction: column; align-items: center; }

    .sphere-wrapper {
        position: relative;
        width: 220px;
        height: 220px;
        border-radius: 50%;
        background: #000;
        overflow: hidden;
        /* Blur suave para as cores não ficarem serrilhadas */
        filter: blur(4px);
    }

    /* Camada que define a COR e o BRILHO da alma */
    .color-layer {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: 2;
        pointer-events: none;
        mix-blend-mode: color-dodge; /* Intensifica o brilho onde houver luz no canvas */
    }

    canvas { width: 100%; height: 100%; filter: blur(12px); }

    .label { 
        color: #fff; opacity: 0.3; font-family: 'Courier New', monospace; 
        font-size: 10px; margin-top: 15px; letter-spacing: 4px; text-transform: uppercase;
    }
</style>
</head>
<body>

<div class="grid" id="grid"></div>

<script>
const SOULS = [
  {id:'a', h:200, a3:'#4eeff0', label:'névoa', speed: 0.8},
  {id:'b', h:15,  a3:'#ff7d50', label:'terra', speed: 1.2},
  {id:'c', h:140, a3:'#90ff90', label:'bosque', speed: 1.5},
  {id:'d', h:280, a3:'#ff50ff', label:'cosmos', speed: 2.0},
  {id:'e', h:45,  a3:'#ffff80', label:'areia', speed: 1.1},
  {id:'f', h:330, a3:'#ff60b0', label:'crepúsculo', speed: 2.5}
];

class LiquidSoul {
    constructor(cfg, container) {
        this.cfg = cfg;
        this.canvas = document.createElement('canvas');
        this.ctx = this.canvas.getContext('2d');
        this.w = this.canvas.width = 300;
        this.h = this.canvas.height = 300;
        container.appendChild(this.canvas);
        
        // Células líquidas
        this.blobs = Array.from({ length: 6 }, () => ({
            x: Math.random() * this.w,
            y: Math.random() * this.h,
            vx: (Math.random() - 0.5) * cfg.speed,
            vy: (Math.random() - 0.5) * cfg.speed,
            r: Math.random() * 50 + 40
        }));
    }

    draw() {
        const { ctx, w, h, blobs, cfg } = this;
        const t = performance.now() * 0.001;
        const hb = Math.pow(Math.sin(t * cfg.speed), 8); // Heartbeat integrado

        ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
        ctx.fillRect(0, 0, w, h);

        blobs.forEach((b, i) => {
            b.x += b.vx + Math.sin(t + i) * 0.5;
            b.y += b.vy + Math.cos(t + i) * 0.5;

            if (b.x < 0 || b.x > w) b.vx *= -1;
            if (b.y < 0 || b.y > h) b.vy *= -1;

            const currentR = b.r * (1 + hb * 0.3);

            // Gradiente de Luminância: O branco puro ativa o Color Dodge no CSS
            const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, currentR);
            g.addColorStop(0, `rgba(255, 255, 255, 1)`); // Núcleo incandescente
            g.addColorStop(0.5, `rgba(100, 100, 100, 0.4)`); // Membrana líquida
            g.addColorStop(1, "rgba(0, 0, 0, 0)");

            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(b.x, b.y, currentR, 0, Math.PI * 2);
            ctx.fill();
        });

        requestAnimationFrame(() => this.draw());
    }
}

// Inicialização do Grid
const grid = document.getElementById('grid');
SOULS.forEach(cfg => {
    const card = document.createElement('div');
    card.className = 'soul-card';
    
    const wrapper = document.createElement('div');
    wrapper.className = 'sphere-wrapper';
    
    // Camada de Cor Neon
    const colorLayer = document.createElement('div');
    colorLayer.className = 'color-layer';
    colorLayer.style.background = `radial-gradient(circle at center, hsla(${cfg.h}, 100%, 60%, 0.9) 0%, hsla(${cfg.h + 30}, 100%, 40%, 0.4) 60%, transparent 100%)`;
    
    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = cfg.label;

    wrapper.appendChild(colorLayer);
    card.appendChild(wrapper);
    card.appendChild(label);
    grid.appendChild(card);

    new LiquidSoul(cfg, wrapper).draw();
});
</script>
</body>
</html>
