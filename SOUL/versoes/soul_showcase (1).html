<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Soul — cinco vidas</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Courier+Prime:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}

body{
  background:#000000;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:'Courier Prime',monospace;
  padding:40px 20px;
}

.stage{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:32px;
  width:100%;
  max-width:900px;
}

.soul-unit{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
}

.soul-wrap{
  position:relative;
  width:100%;
  aspect-ratio:1;
}

canvas.soul{
  display:block;
  width:100%;
  height:100%;
  border-radius:50%;
}

.soul-name{
  font-family:'Playfair Display',serif;
  font-size:13px;
  font-weight:700;
  font-style:italic;
  letter-spacing:-.02em;
  line-height:1.2;
  text-align:center;
}

.soul-tag{
  font-family:'Courier Prime',monospace;
  font-size:9px;
  letter-spacing:.12em;
  text-transform:uppercase;
  text-align:center;
  opacity:.35;
}

/* header */
.header{
  margin-bottom:52px;
  text-align:center;
}
.header h1{
  font-family:'Playfair Display',serif;
  font-size:28px;
  font-weight:900;
  font-style:italic;
  color:rgba(255,255,255,0.08);
  letter-spacing:-.03em;
}
.header p{
  font-size:11px;
  color:rgba(255,255,255,0.18);
  letter-spacing:.14em;
  text-transform:uppercase;
  margin-top:6px;
}
</style>
</head>
<body>

<div class="header">
  <h1>soul</h1>
  <p>cinco vidas · cada uma sua</p>
</div>

<div class="stage" id="stage"></div>

<script>
/* ── DADOS DOS PRESETS ── extraídos do projeto persona_ai ─────────── */
const SOULS = [
  {id:'companion',  name:'O Companheiro',  tag:'Cálido · Paciente',     h:205, s:22, l:48, a3:'#c4f5b7', phaseOffset:0.0},
  {id:'strategist', name:'O Estrategista', tag:'Direto · Decisivo',      h:18,  s:22, l:42, a3:'#bd7992', phaseOffset:1.3},
  {id:'mentor',     name:'O Mentor',       tag:'Sábio · Estimulante',    h:150, s:18, l:40, a3:'#cd9e4a', phaseOffset:2.7},
  {id:'creator',    name:'O Criador',      tag:'Imaginativo · Vivo',     h:270, s:20, l:48, a3:'#c075b4', phaseOffset:4.1},
  {id:'executor',   name:'O Executor',     tag:'Preciso · Incansável',   h:38,  s:22, l:44, a3:'#808a56', phaseOffset:5.5},
];

/* ── ESTADO GLOBAL DO LOOP ── */
let T = 0;  /* tempo global compartilhado, cada soul usa T + phaseOffset */

/* breathwave individual por soul — cada um respira no seu tempo */
function breathwave(offset){
  const period = 8000;
  const ph = ((performance.now() + offset * 1200) % period) / period;
  return 0.5 - 0.5 * Math.cos(ph * Math.PI * 2);
}

/* ── RENDER DE UM SOUL ── mesma lógica do drawAvatarOnCanvas do projeto */
function drawSoul(canvas, soul){
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2, R = W * .46;

  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.clip();

  /* fundo escuro */
  ctx.fillStyle = '#030309'; ctx.fillRect(0,0,W,H);

  const HB  = breathwave(soul.phaseOffset);
  const t   = T + soul.phaseOffset;
  const om  = 1 + 0.08 * HB;
  const bh  = soul.h;
  const bs  = soul.s;
  const bsBlob = Math.min(bs * 2.8, 72);
  const a3  = soul.a3;

  function blob(ox,oy,r,h,s,l,a){
    const pr = r*(1+0.12*HB);
    const pa = a*(1+0.22*HB);
    const sat = Math.min(s*1.3,100);
    const g = ctx.createRadialGradient(cx+ox,cy+oy,0,cx+ox,cy+oy,pr);
    g.addColorStop(0,    `hsla(${h},${sat}%,${l}%,${pa})`);
    g.addColorStop(0.45, `hsla(${h},${sat}%,${l}%,${pa*.3})`);
    g.addColorStop(1,    `hsla(${h},${sat}%,${l}%,0)`);
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  }

  function blobHex(ox,oy,r,hex,a){
    const pr = r*(1+0.10*HB);
    const pa = a*(1+0.18*HB);
    const rv=parseInt(hex.slice(1,3),16),gv=parseInt(hex.slice(3,5),16),bv=parseInt(hex.slice(5,7),16);
    const g = ctx.createRadialGradient(cx+ox,cy+oy,0,cx+ox,cy+oy,pr);
    g.addColorStop(0,   `rgba(${rv},${gv},${bv},${pa})`);
    g.addColorStop(0.4, `rgba(${rv},${gv},${bv},${pa*.25})`);
    g.addColorStop(1,   `rgba(${rv},${gv},${bv},0)`);
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  }

  /* ── blobs da cor mãe ── */
  blob(Math.cos(t*.5)*R*.44*om,             Math.sin(t*.4)*R*.4*om,            R*.9,  bh,    bsBlob,      52, .82);
  blob(Math.cos(t*.7+2.1)*R*.42*om,         Math.sin(t*.6+1.0)*R*.44*om,       R*.78, bh+18, bsBlob*.92,  58, .68);
  blob(Math.cos(t*.9+4.2)*R*.46*om,         Math.sin(t*.8+3.0)*R*.42*om,       R*.65, bh-14, bsBlob*.88,  62, .58);

  /* ── blob do terceiro acento — fase oposta, frequência mais lenta ── */
  blobHex(Math.cos(t*.38+3.1)*R*.48*om,     Math.sin(t*.32+1.7)*R*.44*om,      R*.62, a3, .58);
  blobHex(Math.cos(t*.55+5.4)*R*.32*om,     Math.sin(t*.48+4.2)*R*.30*om,      R*.40, a3, .36);

  /* ── blobs analógicos suaves ── */
  blob(Math.cos(t*.6+1.5)*R*.34*om,         Math.sin(t*1.0+2.5)*R*.34*om,      R*.55, bh+35, bsBlob*.78, 65, .46);
  blob(Math.cos(t*1.1+.8)*R*.3*om,          Math.sin(t*.85+3.8)*R*.32*om,      R*.42, bh-28, bsBlob*.84, 68, .50);

  /* ── realces de luz ── */
  const lx  = cx + Math.cos(t*.45+1)*R*.32,  ly  = cy + Math.sin(t*.55+.5)*R*.28;
  const sh  = ctx.createRadialGradient(lx,ly,0,lx,ly,R*.28);
  sh.addColorStop(0, `hsla(${bh},52%,80%,0.28)`);
  sh.addColorStop(.4,`hsla(${bh},38%,70%,0.10)`);
  sh.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = sh; ctx.fillRect(0,0,W,H);

  const lx2 = cx + Math.cos(t*.6+3.2)*R*.25, ly2 = cy + Math.sin(t*.5+2.0)*R*.22;
  const sh2 = ctx.createRadialGradient(lx2,ly2,0,lx2,ly2,R*.18);
  sh2.addColorStop(0,`hsla(${bh+20},45%,75%,0.18)`);
  sh2.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = sh2; ctx.fillRect(0,0,W,H);

  /* ── vinheta ── */
  const vg = ctx.createRadialGradient(cx,cy,R*.35,cx,cy,R);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(.7,'rgba(1,1,7,0.35)');
  vg.addColorStop(1, 'rgba(1,1,9,0.75)');
  ctx.fillStyle = vg; ctx.fillRect(0,0,W,H);

  ctx.restore();
}

/* ── BUILD DO DOM ── */
function buildStage(){
  const stage = document.getElementById('stage');

  SOULS.forEach(soul => {
    /* cor do texto derivada da cor mãe */
    const textColor = `hsl(${soul.h}, ${Math.min(soul.s*2.2,55)}%, 72%)`;
    const tagColor  = `hsla(${soul.h}, ${Math.min(soul.s*1.5,40)}%, 60%, 0.4)`;

    const unit = document.createElement('div');
    unit.className = 'soul-unit';

    const wrap = document.createElement('div');
    wrap.className = 'soul-wrap';

    /* canvas com resolução 2× para telas retina */
    const canvas = document.createElement('canvas');
    canvas.className = 'soul';
    canvas.id = 'soul_' + soul.id;
    canvas.width  = 220;
    canvas.height = 220;
    wrap.appendChild(canvas);

    const name = document.createElement('div');
    name.className = 'soul-name';
    name.textContent = soul.name;
    name.style.color = textColor;

    const tag = document.createElement('div');
    tag.className = 'soul-tag';
    tag.textContent = soul.tag;
    tag.style.color = tagColor;

    unit.appendChild(wrap);
    unit.appendChild(name);
    unit.appendChild(tag);
    stage.appendChild(unit);
  });
}

/* ── LOOP PRINCIPAL ── */
function loop(){
  SOULS.forEach(soul => {
    const canvas = document.getElementById('soul_' + soul.id);
    if(canvas) drawSoul(canvas, soul);
  });
  T += 0.0108;
  requestAnimationFrame(loop);
}

buildStage();
loop();
</script>
</body>
</html>
