<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Soul Grid</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900&family=Courier+Prime:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}

body{
  background:#000;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:48px 32px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(2,1fr);
  gap:28px;
  width:100%;
  max-width:720px;
}

.cell{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
}

.wrap{
  width:100%;
  aspect-ratio:1;
  position:relative;
}

canvas{
  display:block;
  width:100%;
  height:100%;
  border-radius:50%;
}

.label{
  font-family:'Courier Prime',monospace;
  font-size:9px;
  letter-spacing:.16em;
  text-transform:uppercase;
  opacity:.28;
  color:#fff;
  text-align:center;
}
</style>
</head>
<body>
<div class="grid" id="grid"></div>

<script>
/* ── 6 paletas — cada uma com cor mãe (h,s,l) + accent3 ── */
const SOULS = [
  /* linha 1 */
  {id:'a', h:205, s:22, l:48, a3:'#c4f5b7', speed:0.0042, phase:0.00, label:'névoa'},
  {id:'b', h:18,  s:22, l:42, a3:'#bd7992', speed:0.0108, phase:1.30, label:'terra'},
  {id:'c', h:150, s:18, l:40, a3:'#cd9e4a', speed:0.0210, phase:2.70, label:'bosque'},
  /* linha 2 */
  {id:'d', h:270, s:20, l:48, a3:'#c075b4', speed:0.0380, phase:4.10, label:'cosmos'},
  {id:'e', h:38,  s:22, l:44, a3:'#808a56', speed:0.0620, phase:5.50, label:'areia'},
  {id:'f', h:320, s:18, l:45, a3:'#7ec8c0', speed:0.1040, phase:0.80, label:'crepúsculo'},
];

/* tempo individual por soul */
const T = {};
SOULS.forEach(s => { T[s.id] = s.phase; });

/* ── HEARTBEAT ─────────────────────────────────────────────────────────
   Cada soul bate no seu próprio ritmo, proporcional à sua speed.
   A forma é um batimento cardíaco real: subida rápida (pico sistólico),
   leve recuo, segundo pico menor (diastólico), queda e pausa.
   ph ∈ [0,1] = posição no ciclo cardíaco.
   BPM proporcional à speed: soul mais rápido = coração mais acelerado.
   soul 'a' (speed 0.0042) → ~38 bpm  (repouso profundo)
   soul 'b' (speed 0.0108) → ~62 bpm  (referência)
   soul 'f' (speed 0.1040) → ~145 bpm (agitado)              */
const BASE_SPEED = 0.0108;   /* speed de referência (~62 bpm) */
const BASE_BPM   = 62;

function heartbeat(soul){
  const bpm    = BASE_BPM * (soul.speed / BASE_SPEED);
  const period = 60000 / bpm;                          /* ms por batida */
  const ph     = (performance.now() % period) / period; /* 0..1 no ciclo */

  /* forma do pulso cardíaco — construída com gaussianas sobrepostas:
     pico1 = sístole (rápido, alto)
     pico2 = diástole (mais lento, menor, ~60% da sístole)
     entre 0.35 e 1.0 = diástole longa (pausa) → quase zero */
  const gauss = (x, mu, sig) => Math.exp(-0.5*((x-mu)/sig)**2);
  const p1 = gauss(ph, 0.10, 0.045) * 1.00;   /* sístole */
  const p2 = gauss(ph, 0.22, 0.055) * 0.58;   /* diástole */
  const hb = Math.max(0, p1 + p2);
  return hb;   /* 0..1, pico em ~0.10 do ciclo */
}

/* ── render — lógica idêntica ao av-mh do projeto persona_ai ── */
function drawSoul(canvas, soul){
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2, R = W * .46;

  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.clip();
  ctx.fillStyle = '#030309'; ctx.fillRect(0,0,W,H);

  const HB  = heartbeat(soul);
  const t   = T[soul.id];
  const om  = 1 + 0.096 * HB;   /* +20% centrífugo via heartbeat */
  const bh  = soul.h;
  const bs  = soul.s;
  const bsB = Math.min(bs * 2.8, 72);
  const a3  = soul.a3;

  /* ── blob orgânico: posição + forma fluidas via noise de senos ────────
     n2(f,p) = noise suave 2D: combina 4 senos em frequências primas.
     Cada blob tem seed próprio que desloca suas fases — garante que
     nenhum par de blobs oscile em harmonia. A deformação interna usa
     ctx.transform com rx/ry/skew variando devagar e de forma contínua,
     sem quebras — puro fluxo. O centro de cada gradiente também oscila
     ligeiramente dentro do blob (inner drift), criando a sensação de
     que a cor tem peso e se move por inércia interna. */

  function n2(f, p){ /* noise suave: 4 harmônicos em proporções de ouro */
    return 0.42*Math.sin(t*f      + p)
         + 0.28*Math.sin(t*f*1.618+ p*1.3)
         + 0.18*Math.sin(t*f*2.618+ p*2.1)
         + 0.12*Math.sin(t*f*4.236+ p*3.4);
  }

  function drawBlob(ox, oy, r, fillFn, seed){
    /* amplitude de pulsação do raio — suave, nunca estica demais */
    const pulse = 1 + 0.14*n2(0.23, seed*1.1) + 0.07*HB;
    const pr    = r * pulse;

    /* deformação interna — frequências muito lentas para fluidez */
    const ang  = n2(0.17, seed*0.7) * 0.55;            /* rotação ±0.55 rad */
    const rxS  = 1 + 0.30 * n2(0.13, seed*1.3);        /* escala X 0.70..1.30 */
    const ryS  = 1 + 0.26 * n2(0.11, seed*2.1);        /* escala Y 0.74..1.26 */
    const skew = 0.18 * n2(0.09, seed*3.7);             /* cisalhamento suave */

    /* drift interno: o centro do gradiente flutua dentro do blob */
    const dx = pr * 0.22 * n2(0.31, seed*0.9);
    const dy = pr * 0.18 * n2(0.29, seed*1.7);

    ctx.save();
    ctx.translate(cx + ox, cy + oy);
    ctx.rotate(ang);
    ctx.transform(rxS, skew, 0, ryS, 0, 0);

    const g = ctx.createRadialGradient(dx, dy, 0,  0, 0, pr);
    fillFn(g, pr);

    ctx.fillStyle = g;
    /* forma: círculo ligeiramente supercircular via scaling já aplicado */
    ctx.beginPath(); ctx.arc(0, 0, pr, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function blobHSL(ox,oy, r, h,s,l,a, seed){
    const pr0 = r*(1+0.12*HB);
    const pa  = a*(1+0.20*HB);
    const sat = Math.min(s*1.3, 100);
    drawBlob(ox,oy, pr0, (g,pr)=>{
      g.addColorStop(0,    `hsla(${h},${sat}%,${l}%,${pa})`);
      g.addColorStop(0.30, `hsla(${h},${sat}%,${Math.min(l+8,95)}%,${pa*.55})`);
      g.addColorStop(0.62, `hsla(${h},${sat}%,${l}%,${pa*.18})`);
      g.addColorStop(0.85, `hsla(${h},${sat}%,${Math.max(l-6,5)}%,${pa*.05})`);
      g.addColorStop(1,    `hsla(${h},${sat}%,${l}%,0)`);
    }, seed);
  }

  function blobRGB(ox,oy, r, hex, a, seed){
    const pr0 = r*(1+0.10*HB);
    const pa  = a*(1+0.18*HB);
    const rv=parseInt(hex.slice(1,3),16), gv=parseInt(hex.slice(3,5),16), bv=parseInt(hex.slice(5,7),16);
    drawBlob(ox,oy, pr0, (g,pr)=>{
      g.addColorStop(0,    `rgba(${rv},${gv},${bv},${pa})`);
      g.addColorStop(0.32, `rgba(${rv},${gv},${bv},${pa*.50})`);
      g.addColorStop(0.65, `rgba(${rv},${gv},${bv},${pa*.15})`);
      g.addColorStop(1,    `rgba(${rv},${gv},${bv},0)`);
    }, seed);
  }

  /* posições: wander suave — somas de senos lentos, sem órbita circular rígida */
  function pos(fa, fb, pa, pb, amp){
    return R * amp * om * (0.6*Math.sin(t*fa+pa) + 0.4*Math.sin(t*fb+pb));
  }

  /* ── 7 blobs ─────────────────────────────────────────────────────── */
  blobHSL(pos(.37,.61,0.00,1.10,.624), pos(.31,.53,3.14,0.70,.552), R*.90, bh,    bsB,    52, .84, 1.0);
  blobHSL(pos(.53,.89,1.20,3.50,.552), pos(.47,.79,2.40,0.30,.600), R*.76, bh+18, bsB*.9, 58, .70, 2.0);
  blobHSL(pos(.71,1.19,4.20,1.60,.528),pos(.67,1.09,0.90,5.30,.504),R*.64, bh-14, bsB*.86,62, .60, 3.0);
  blobRGB(pos(.29,.47,3.10,5.40,.600), pos(.31,.51,1.70,2.90,.552), R*.62, a3,          .60, 4.0);
  blobRGB(pos(.43,.71,5.40,0.70,.432), pos(.41,.67,4.20,1.50,.384), R*.42, a3,          .38, 5.0);
  blobHSL(pos(.59,.97,1.50,3.80,.480), pos(.61,1.01,2.50,0.60,.456),R*.54, bh+35, bsB*.76,65, .48, 6.0);
  blobHSL(pos(.83,1.37,0.80,2.50,.432),pos(.79,1.31,3.80,1.20,.408),R*.44, bh-28, bsB*.82,68, .52, 7.0);

  /* realce de luz — posição flutuante */
  const lx  = cx + pos(.37,.61,1.0,2.4,.408), ly = cy + pos(.43,.71,0.5,3.1,.360);
  const sh  = ctx.createRadialGradient(lx,ly,0,lx,ly,R*.32);
  sh.addColorStop(0,`hsla(${bh},48%,82%,0.24)`);
  sh.addColorStop(.5,`hsla(${bh},34%,72%,0.08)`);
  sh.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=sh; ctx.fillRect(0,0,W,H);

  const lx2 = cx + pos(.29,.47,3.2,0.8,.336), ly2 = cy + pos(.31,.53,2.0,4.6,.288);
  const sh2 = ctx.createRadialGradient(lx2,ly2,0,lx2,ly2,R*.22);
  sh2.addColorStop(0,`hsla(${bh+22},40%,76%,0.17)`);
  sh2.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=sh2; ctx.fillRect(0,0,W,H);

  /* vinheta */
  const vg = ctx.createRadialGradient(cx,cy,R*.35,cx,cy,R);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(.7,'rgba(1,1,7,0.42)');
  vg.addColorStop(1, 'rgba(1,1,9,0.9)');
  ctx.fillStyle = vg; ctx.fillRect(0,0,W,H);

  /* ── elementos nítidos — formas duras sem blur, sobre o degradê ──── */
  const lt  = `hsla(${bh},${Math.min(bsB*1.1,80)}%,84%`;
  const rv2 = parseInt(a3.slice(1,3),16);
  const gv2 = parseInt(a3.slice(3,5),16);
  const bv2 = parseInt(a3.slice(5,7),16);

  /* helper de posição nítida — seeds altos = fases longe dos blobs */
  function np(fa,fb,pa,pb,amp){
    return R*amp*(0.6*Math.sin(t*fa+pa)+0.4*Math.sin(t*fb+pb));
  }

  /* 1. linha fina — cruza o soul de ponta a ponta, cor da paleta */
  ctx.beginPath();
  ctx.moveTo(cx+np(.19,.31,1.1,3.7,.78), cy+np(.23,.37,4.2,0.8,.72));
  ctx.lineTo(cx+np(.41,.67,2.3,5.1,.82), cy+np(.37,.59,0.4,2.9,.78));
  ctx.strokeStyle=`${lt},${0.30+0.22*HB})`;
  ctx.lineWidth=0.7; ctx.stroke();

  /* 2. linha accent3 — mais curta, fase oposta */
  ctx.beginPath();
  ctx.moveTo(cx+np(.53,.83,5.4,1.2,.62), cy+np(.47,.73,2.8,4.6,.58));
  ctx.lineTo(cx+np(.29,.43,3.7,0.5,.66), cy+np(.31,.51,1.6,3.3,.62));
  ctx.strokeStyle=`rgba(${rv2},${gv2},${bv2},${0.34+0.22*HB})`;
  ctx.lineWidth=0.5; ctx.stroke();

  /* 3. ponto sólido — pulsa forte com o heartbeat */
  const dr = 1.8+2.4*HB;
  ctx.beginPath();
  ctx.arc(cx+np(.61,.97,0.7,4.1,.48), cy+np(.57,.89,3.5,1.8,.44), dr, 0, Math.PI*2);
  ctx.fillStyle=`${lt},${0.72+0.26*HB})`;
  ctx.fill();

  /* 4. ponto accent3 — menor, movimento próprio */
  const dr2 = 1.1+1.6*HB;
  ctx.beginPath();
  ctx.arc(cx+np(.79,1.27,2.1,5.8,.40), cy+np(.83,1.31,4.9,0.3,.38), dr2, 0, Math.PI*2);
  ctx.fillStyle=`rgba(${rv2},${gv2},${bv2},${0.78+0.20*HB})`;
  ctx.fill();

  /* 5. arco parcial — gira lentamente, raio varia */
  const arcx=cx+np(.17,.27,3.3,1.5,.38), arcy=cy+np(.13,.21,0.9,4.7,.34);
  const arcR=4+3.5*n2(0.07,22.0);
  const arcRot=t*0.38+n2(0.11,17.3)*2.2;
  const arcSpan=Math.PI*(0.38+0.44*n2(0.09,28.4));
  ctx.beginPath();
  ctx.arc(arcx,arcy,arcR,arcRot,arcRot+arcSpan);
  ctx.strokeStyle=`${lt},${0.38+0.24*HB})`;
  ctx.lineWidth=0.7; ctx.stroke();

  /* 6. cruz mínima — gira e pulsa */
  const crx=cx+np(.43,.69,4.8,2.2,.56), cry=cy+np(.39,.63,1.4,5.6,.52);
  const crSz=3.2+1.8*HB;
  ctx.save();
  ctx.translate(crx,cry); ctx.rotate(t*0.26+n2(0.13,41.2)*1.6);
  ctx.strokeStyle=`${lt},${0.32+0.20*HB})`;
  ctx.lineWidth=0.6;
  ctx.beginPath(); ctx.moveTo(-crSz,0); ctx.lineTo(crSz,0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,-crSz); ctx.lineTo(0,crSz); ctx.stroke();
  ctx.restore();

  ctx.restore();
}

/* ── build DOM ── */
function build(){
  const grid = document.getElementById('grid');
  SOULS.forEach(soul => {
    const cell   = document.createElement('div'); cell.className = 'cell';
    const wrap   = document.createElement('div'); wrap.className = 'wrap';
    const canvas = document.createElement('canvas');
    canvas.id     = 'c_' + soul.id;
    canvas.width  = 220;
    canvas.height = 220;
    const lbl = document.createElement('div'); lbl.className = 'label';
    lbl.textContent = soul.label;
    wrap.appendChild(canvas);
    cell.appendChild(wrap);
    cell.appendChild(lbl);
    grid.appendChild(cell);
  });
}

/* ── loop — cada soul avança T no seu próprio ritmo ── */
function loop(){
  SOULS.forEach(soul => {
    T[soul.id] += soul.speed;          /* velocidade própria de cada soul */
    const canvas = document.getElementById('c_' + soul.id);
    if(canvas) drawSoul(canvas, soul);
  });
  requestAnimationFrame(loop);
}

build();
loop();
</script>
</body>
</html>
