<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>✦ Alexia · Soul Warriors</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --pink:   #FF4FA3;
  --purple: #B44FFF;
  --cyan:   #00E5FF;
  --yellow: #FFE000;
  --green:  #39FF14;
  --orange: #FF6B1A;
  --bg:     #06000f;
  --glow: #FF4FA3;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  width: 100%;
  overflow-x: hidden;
  cursor: default;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    radial-gradient(1px 1px at 8%  12%, rgba(255,255,255,.9)  0%, transparent 100%),
    radial-gradient(1px 1px at 22% 45%, rgba(255,79,163,.7)   0%, transparent 100%),
    radial-gradient(1px 1px at 35% 8%,  rgba(255,255,255,.6)  0%, transparent 100%),
    radial-gradient(1px 1px at 48% 75%, rgba(180,79,255,.8)   0%, transparent 100%),
    radial-gradient(1px 1px at 60% 20%, rgba(255,255,255,.9)  0%, transparent 100%),
    radial-gradient(1px 1px at 72% 55%, rgba(0,229,255,.6)    0%, transparent 100%),
    radial-gradient(1px 1px at 85% 35%, rgba(255,255,255,.7)  0%, transparent 100%),
    radial-gradient(1px 1px at 92% 80%, rgba(255,224,0,.6)    0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 15% 90%, rgba(255,255,255,.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 55% 50%, rgba(255,79,163,.4)   0%, transparent 100%);
  pointer-events: none; z-index: 0;
}

/* ── HEADER ── */
header {
  position: relative; z-index: 10;
  width: 100%;
  padding: 18px 20px 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.brand-left {
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}

.brand-star { width: 44px; height: 44px; flex-shrink: 0; }
.brand-star svg {
  width: 100%; height: 100%;
  animation: star-pulse 3s ease-in-out infinite;
  filter: drop-shadow(0 0 10px #FF4FA3) drop-shadow(0 0 22px #B44FFF);
}
@keyframes star-pulse {
  0%,100% { transform: scale(1) rotate(0deg); }
  50%      { transform: scale(1.14) rotate(18deg); }
}

.alexia-name {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(1.3rem, 3.5vw, 1.9rem);
  background: linear-gradient(135deg, var(--pink) 0%, var(--purple) 55%, var(--cyan) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  filter: drop-shadow(0 0 14px rgba(180,79,255,.6));
  letter-spacing: .06em; line-height: 1;
}
.alexia-sub {
  font-weight: 900; font-size: .6rem; letter-spacing: .22em;
  text-transform: uppercase; color: rgba(255,255,255,.28); margin-top: 2px;
}

.soul-title-wrap { text-align: center; }
.soul-title {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(1.4rem, 4vw, 2.5rem);
  background: linear-gradient(135deg, #fff 0%, var(--cyan) 50%, var(--purple) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  filter: drop-shadow(0 0 16px rgba(0,229,255,.4)); letter-spacing: .08em;
}
.soul-sub {
  font-weight: 900; font-size: .6rem; letter-spacing: .2em;
  text-transform: uppercase; color: rgba(255,255,255,.28);
}
.header-right { width: 44px; flex-shrink: 0; }

/* ── MAIN ── */
main {
  position: relative; z-index: 5;
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 14px;
  padding: 4px 16px 32px;
  max-width: 1100px;
  margin: 0 auto;
}

/* ── WARRIORS GRID ── */
#grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  align-content: start;
}

.warrior-card {
  position: relative; border-radius: 14px; overflow: hidden;
  border: 2px solid rgba(255,255,255,.07);
  transition: transform .18s, border-color .25s, box-shadow .25s;
  cursor: pointer; background: #040010;
}
.warrior-card:hover { transform: translateY(-3px) scale(1.025); }
.warrior-card.active {
  border-color: var(--glow-color);
  box-shadow: 0 0 0 1px var(--glow-color), 0 0 24px var(--glow-color),
              0 0 50px color-mix(in srgb, var(--glow-color) 25%, transparent);
}

.canvas-wrap { position: relative; width: 100%; }
.warrior-canvas { display: block; width: 100%; height: 100%; background: #020208; }

.crown-badge {
  position: absolute; top: 5px; right: 7px; font-size: 1.1rem;
  opacity: 0; transition: opacity .28s;
  filter: drop-shadow(0 0 8px gold); pointer-events: none; z-index: 10;
}
.warrior-card.active .crown-badge { opacity: 1; }

.warrior-footer {
  background: rgba(0,0,0,.65); padding: 5px 8px 7px;
  text-align: center; border-top: 1px solid rgba(255,255,255,.05);
}
.warrior-name {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(.72rem, 1.7vw, .92rem); letter-spacing: .04em;
}
.warrior-power {
  font-size: clamp(.5rem, 1.1vw, .62rem); font-weight: 900;
  letter-spacing: .12em; text-transform: uppercase; margin-top: 1px; opacity: .65;
}

/* ── RIGHT COLUMN ── */
#right-col { display: flex; flex-direction: column; gap: 12px; }

/* hero big display */
#hero-display {
  background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.08);
  border-radius: 14px; padding: 10px; text-align: center; flex-shrink: 0;
}
.hero-canvas-wrap { position: relative; width: 100%; }
#hero-canvas { display: block; width: 100%; background: #020208; border-radius: 10px; }
.hero-name {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(.95rem, 2vw, 1.25rem); letter-spacing: .05em; margin-top: 6px;
}
.hero-power {
  font-weight: 900; font-size: clamp(.56rem, 1.2vw, .7rem);
  letter-spacing: .17em; text-transform: uppercase; color: rgba(255,255,255,.45); margin-top: 2px;
}

/* ═══════════════════════════════════════════
   MAGIC ORBS PANEL
═══════════════════════════════════════════ */
#magic-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.magic-panel-title {
  font-family: 'Fredoka One', cursive;
  font-size: .8rem; letter-spacing: .1em;
  color: rgba(255,255,255,.35); text-align: center;
  text-transform: uppercase;
}

/* grid of orb widgets */
#orbs-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

/* each orb widget card */
.orb-widget {
  background: rgba(255,255,255,.03);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 14px;
  padding: 10px 8px 8px;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  transition: border-color .2s;
  position: relative;
  overflow: hidden;
  user-select: none; -webkit-user-select: none;
}

.orb-widget:hover { border-color: rgba(255,255,255,.12); }

.orb-title {
  font-family: 'Fredoka One', cursive;
  font-size: .72rem; letter-spacing: .06em;
  color: rgba(255,255,255,.5);
  text-align: center; line-height: 1;
}

/* THE ORB CANVAS */
.orb-canvas-wrap {
  position: relative;
  width: 72px; height: 72px;
  cursor: grab;
  flex-shrink: 0;
}
.orb-canvas-wrap:active { cursor: grabbing; }

.orb-canvas {
  display: block; width: 100%; height: 100%;
  border-radius: 50%;
}

/* value indicator below orb */
.orb-value-label {
  font-family: 'Fredoka One', cursive;
  font-size: .7rem; letter-spacing: .05em;
  color: rgba(255,255,255,.4);
  text-align: center;
  min-height: 1em;
  transition: color .2s;
}

/* ── GIANT ORB for Girar (special) ── */
.orb-widget.wide {
  grid-column: span 2;
  flex-direction: row;
  align-items: center;
  padding: 10px 14px;
  gap: 12px;
}
.orb-widget.wide .orb-canvas-wrap { width: 80px; height: 80px; }
.orb-widget.wide .orb-title-wrap { flex: 1; }
.orb-widget.wide .orb-title { text-align: left; font-size: .78rem; }
.orb-widget.wide .orb-value-label { text-align: left; margin-top: 2px; }

/* ── SPARKLE burst on interaction ── */
@keyframes sparkle-pop {
  0%   { transform: scale(0) rotate(0deg); opacity: 1; }
  60%  { transform: scale(1.5) rotate(180deg); opacity: .8; }
  100% { transform: scale(2) rotate(360deg); opacity: 0; }
}
.sparkle {
  position: absolute; pointer-events: none; font-size: 1.1rem;
  animation: sparkle-pop .55s ease-out forwards;
  transform-origin: center;
}

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: linear-gradient(135deg, var(--pink), var(--purple));
  color: #fff; font-family: 'Fredoka One', cursive;
  font-size: clamp(.85rem, 2.2vw, 1rem); padding: 9px 24px; border-radius: 40px;
  box-shadow: 0 4px 24px rgba(180,79,255,.5);
  transition: transform .35s cubic-bezier(.34,1.56,.64,1);
  z-index: 999; white-space: nowrap; pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ── RESPONSIVE ── */
@media (max-width: 680px) {
  main { grid-template-columns: 1fr; padding: 0 10px 24px; }
  #right-col { order: 2; }
  #hero-display { display: none; }
  #grid { grid-template-columns: repeat(3, 1fr); }
  #orbs-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<header>
  <div class="brand-left">
    <div class="brand-star">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="sg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
            <stop offset="0%"   stop-color="#FF4FA3"/>
            <stop offset="50%"  stop-color="#B44FFF"/>
            <stop offset="100%" stop-color="#00E5FF"/>
          </linearGradient>
        </defs>
        <path d="M24 2 L27 19.5 L44 22 L27 24.5 L24 46 L21 24.5 L4 22 L21 19.5 Z" fill="url(#sg)"/>
        <circle cx="10" cy="8"  r="1.8" fill="#FF4FA3" opacity=".7"/>
        <circle cx="39" cy="37" r="1.4" fill="#00E5FF" opacity=".7"/>
        <circle cx="40" cy="10" r="1.1" fill="#FFE000" opacity=".8"/>
        <circle cx="8"  cy="38" r="1"   fill="#B44FFF" opacity=".6"/>
      </svg>
    </div>
    <div>
      <div class="alexia-name">alexia</div>
      <div class="alexia-sub">✦ universe</div>
    </div>
  </div>

  <div class="soul-title-wrap">
    <div class="soul-title">SOUL WARRIORS</div>
    <div class="soul-sub">✦ as guerreiras da névoa ✦</div>
  </div>

  <div class="header-right"></div>
</header>

<main>
  <div id="grid"></div>

  <div id="right-col">
    <div id="hero-display">
      <div class="hero-canvas-wrap">
        <canvas id="hero-canvas"></canvas>
      </div>
      <div id="hero-name" class="hero-name">🔥 RUBY</div>
      <div id="hero-power" class="hero-power">Fogo do Coração</div>
    </div>

    <div id="magic-panel">
      <div class="magic-panel-title">✦ poderes mágicos ✦</div>
      <div id="orbs-grid"></div>
    </div>
  </div>
</main>

<div id="toast">✨ ...</div>

<script>
/* ════════════════════════════════════════════
   WARRIORS
════════════════════════════════════════════ */
const WARRIORS = [
  {id:'a', name:'LUNA',   power:'Névoa Lunar',     emoji:'🌙', h:205, s:22, l:48, a3:[196,245,183], speed:.0042, phase:0.00, bperiod:7800, glow:'#00E5FF'},
  {id:'b', name:'RUBY',   power:'Fogo do Coração', emoji:'🔥', h:18,  s:22, l:42, a3:[189,121,146], speed:.0108, phase:1.30, bperiod:8200, glow:'#FF4FA3'},
  {id:'c', name:'IVY',    power:'Bosque Mágico',   emoji:'🌿', h:150, s:18, l:40, a3:[205,158, 74], speed:.0210, phase:2.70, bperiod:7400, glow:'#39FF14'},
  {id:'d', name:'VEGA',   power:'Cosmo Infinito',  emoji:'💜', h:270, s:20, l:48, a3:[192,117,180], speed:.0380, phase:4.10, bperiod:8600, glow:'#B44FFF'},
  {id:'e', name:'SANDY',  power:'Areia Dourada',   emoji:'⭐', h:38,  s:22, l:44, a3:[128,138, 86], speed:.0620, phase:5.50, bperiod:7100, glow:'#FFE000'},
  {id:'f', name:'AURORA', power:'Crepúsculo Rosa', emoji:'🌸', h:320, s:18, l:45, a3:[126,200,192], speed:.1040, phase:0.80, bperiod:9000, glow:'#FF6B1A'},
];

/* ════════════════════════════════════════════
   POWERS — now with orb config
════════════════════════════════════════════ */
const POWERS = {
  turbulence: {
    emoji:'🌀', label:'Redemoinho', sublabel:'faíscas', value:1, min:0, max:3, step:.5,
    orbType: 'spin',       // rotating vortex
    orbColor: ['#B44FFF','#FF4FA3'],
    emojis: ['😴','🌀','🌀','🌪️','⚡'],
    valueLabels: ['dormindo','girando','girando!','furacão!','TEMPESTADE!!'],
  },
  density: {
    emoji:'💨', label:'Fumaça', sublabel:'grossa ou fininha', value:1, min:0, max:2, step:.5,
    orbType: 'puff',       // expanding/contracting cloud
    orbColor: ['#aaaaff','#ffffff'],
    emojis: ['🌫️','💨','💥','🌊','🌊'],
    valueLabels: ['sumindo','chegando','GROSSA!','enorme!','MÁXIMO!'],
  },
  drift: {
    emoji:'🪂', label:'Voar', sublabel:'sobe ou desce', value:0, min:-1, max:1, step:.5,
    orbType: 'float',      // vertical bob
    orbColor: ['#00E5FF','#39FF14'],
    emojis: ['⬇️','↙️','😴','↗️','⬆️'],
    valueLabels: ['caindo','descendo','parada','subindo','VOANDO!'],
  },
  halo: {
    emoji:'🌟', label:'Brilho', sublabel:'luz por dentro', value:1, min:0, max:2, step:.5,
    orbType: 'glow',       // pulsing light
    orbColor: ['#FFE000','#FF4FA3'],
    emojis: ['🔦','✨','⭐','🌟','☀️'],
    valueLabels: ['apagado','brilhando','estrela!','sol!','DEUS LUZ!'],
  },
  dissipation: {
    emoji:'🫧', label:'Borda', sublabel:'some rápido', value:1, min:0, max:2, step:.5,
    orbType: 'dissolve',   // fading edge rings
    orbColor: ['#00E5FF','#B44FFF'],
    emojis: ['🐢','🚶','🏃','💨','💫'],
    valueLabels: ['devagar...','caminhando','correndo!','flash!','ZAP!!'],
  },
  centrifugal: {
    emoji:'💫', label:'Expansão', sublabel:'explode pra fora', value:1, min:0, max:3, step:.5,
    orbType: 'burst',      // exploding particles
    orbColor: ['#FF6B1A','#FFE000'],
    emojis: ['😴','🌀','💫','🌈','☄️','✨','🎆'],
    valueLabels: ['dormindo','acordando','girando!','voando!','BOOM!','ÉPICO!','FIM DO MUNDO!!'],
    wide: true,
  },
};

/* ════════════════════════════════════════════
   STATE
════════════════════════════════════════════ */
const T={};
WARRIORS.forEach(w=>T[w.id]=w.phase);
let selectedId='b';

/* offscreens for warriors */
const off={};
WARRIORS.forEach(w=>{const c=document.createElement('canvas');off[w.id]={c,ctx:c.getContext('2d')};});
const heroOff=document.createElement('canvas');
const heroOffCtx=heroOff.getContext('2d');

/* orb animation times */
const orbT={};

/* ════════════════════════════════════════════
   BUILD WARRIORS GRID
════════════════════════════════════════════ */
const gridEl=document.getElementById('grid');
const cnvMap={};

WARRIORS.forEach(w=>{
  const card=document.createElement('div');
  card.className='warrior-card'; card.id='card_'+w.id;
  card.style.setProperty('--glow-color',w.glow);

  const crown=document.createElement('span');
  crown.className='crown-badge'; crown.textContent='👑';

  const wrap=document.createElement('div');
  wrap.className='canvas-wrap'; wrap.id='wrap_'+w.id;

  const cnv=document.createElement('canvas');
  cnv.className='warrior-canvas'; cnvMap[w.id]=cnv;

  const footer=document.createElement('div');
  footer.className='warrior-footer';
  const nameEl=document.createElement('div');
  nameEl.className='warrior-name'; nameEl.style.color=w.glow;
  nameEl.textContent=w.emoji+' '+w.name;
  const powerEl=document.createElement('div');
  powerEl.className='warrior-power'; powerEl.style.color=w.glow;
  powerEl.textContent=w.power;

  footer.append(nameEl,powerEl);
  wrap.append(cnv);
  card.append(crown,wrap,footer);
  card.addEventListener('click',()=>selectWarrior(w.id));
  gridEl.appendChild(card);
});

/* ════════════════════════════════════════════
   BUILD MAGIC ORBS
════════════════════════════════════════════ */
const orbCanvases={};
const orbDragState={};

function buildOrbsGrid(){
  const grid=document.getElementById('orbs-grid');
  grid.innerHTML='';

  Object.entries(POWERS).forEach(([key,p])=>{
    orbT[key] = orbT[key] || 0;

    const widget=document.createElement('div');
    widget.className='orb-widget'+(p.wide?' wide':'');

    if(p.wide){
      // horizontal layout
      const canvasWrap=document.createElement('div');
      canvasWrap.className='orb-canvas-wrap';

      const cnv=document.createElement('canvas');
      cnv.className='orb-canvas';
      cnv.width=160; cnv.height=160;
      orbCanvases[key]=cnv;
      canvasWrap.appendChild(cnv);

      const textWrap=document.createElement('div');
      textWrap.className='orb-title-wrap';
      const title=document.createElement('div');
      title.className='orb-title';
      title.textContent=p.emoji+' '+p.label;
      const valLabel=document.createElement('div');
      valLabel.className='orb-value-label';
      valLabel.id='orblabel_'+key;
      valLabel.textContent=getLabelForValue(p);
      textWrap.append(title,valLabel);

      widget.append(canvasWrap,textWrap);
      attachOrbInteraction(canvasWrap,key,p);
    } else {
      const canvasWrap=document.createElement('div');
      canvasWrap.className='orb-canvas-wrap';

      const cnv=document.createElement('canvas');
      cnv.className='orb-canvas';
      cnv.width=144; cnv.height=144;
      orbCanvases[key]=cnv;
      canvasWrap.appendChild(cnv);

      const title=document.createElement('div');
      title.className='orb-title';
      title.textContent=p.emoji+' '+p.label;

      const valLabel=document.createElement('div');
      valLabel.className='orb-value-label';
      valLabel.id='orblabel_'+key;
      valLabel.textContent=getLabelForValue(p);

      widget.append(title,canvasWrap,valLabel);
      attachOrbInteraction(canvasWrap,key,p);
    }

    grid.appendChild(widget);
  });
}

function getLabelForValue(p){
  const steps=[];
  for(let v=p.min;v<=p.max+.001;v+=p.step)steps.push(Math.round(v*10)/10);
  const idx=steps.findIndex(v=>Math.abs(v-p.value)<.001);
  return p.valueLabels?.[idx] ?? '';
}

function getWarriorGlow(){
  return WARRIORS.find(w=>w.id===selectedId)?.glow||'#FF4FA3';
}

/* ════════════════════════════════════════════
   ORB INTERACTION — drag up/down or swipe
════════════════════════════════════════════ */
function attachOrbInteraction(wrap, key, p){
  let startY=null, startVal=null, dragging=false;

  const getSteps=()=>{
    const s=[];
    for(let v=p.min;v<=p.max+.001;v+=p.step)s.push(Math.round(v*10)/10);
    return s;
  };

  const clampToStep=(raw)=>{
    const steps=getSteps();
    return steps.reduce((a,b)=>Math.abs(b-raw)<Math.abs(a-raw)?b:a);
  };

  const onStart=(clientY)=>{
    startY=clientY; startVal=p.value; dragging=true;
    wrap.style.cursor='grabbing';
  };

  const onMove=(clientY)=>{
    if(!dragging||startY===null)return;
    const dy=startY-clientY; // drag up = increase
    const range=p.max-p.min;
    const delta=(dy/90)*range;
    const raw=Math.max(p.min,Math.min(p.max,startVal+delta));
    const newVal=clampToStep(raw);
    if(Math.abs(newVal-p.value)>.001){
      POWERS[key].value=newVal;
      updateOrbLabel(key,p);
      spawnSparkle(wrap);
    }
  };

  const onEnd=()=>{
    if(dragging){
      dragging=false; startY=null;
      wrap.style.cursor='grab';
      showToast(p.emoji+' '+getLabelForValue(p));
    }
  };

  // Mouse
  wrap.addEventListener('mousedown',e=>{e.preventDefault();onStart(e.clientY);});
  window.addEventListener('mousemove',e=>{ if(dragging)onMove(e.clientY); });
  window.addEventListener('mouseup',()=>{ if(dragging)onEnd(); });

  // Touch
  wrap.addEventListener('touchstart',e=>{e.preventDefault();onStart(e.touches[0].clientY);},{passive:false});
  wrap.addEventListener('touchmove',e=>{e.preventDefault();onMove(e.touches[0].clientY);},{passive:false});
  wrap.addEventListener('touchend',()=>onEnd());

  // Tap to increment (quick tap without drag)
  let tapStartY=0, tapStartTime=0;
  wrap.addEventListener('mousedown',e=>{tapStartY=e.clientY;tapStartTime=Date.now();});
  wrap.addEventListener('mouseup',e=>{
    if(Date.now()-tapStartTime<200&&Math.abs(e.clientY-tapStartY)<8){
      // quick tap = go to next step
      const steps=getSteps();
      const cur=steps.findIndex(v=>Math.abs(v-p.value)<.001);
      const next=(cur+1)%steps.length;
      POWERS[key].value=steps[next];
      updateOrbLabel(key,p);
      spawnSparkle(wrap);
      showToast(p.emoji+' '+getLabelForValue(p));
    }
  });
}

function updateOrbLabel(key,p){
  const el=document.getElementById('orblabel_'+key);
  if(el) el.textContent=getLabelForValue(p);
}

function spawnSparkle(container){
  const icons=['✨','⭐','💫','🌟','✦','•'];
  const s=document.createElement('span');
  s.className='sparkle';
  s.textContent=icons[Math.floor(Math.random()*icons.length)];
  s.style.left=Math.random()*80+'%';
  s.style.top=Math.random()*80+'%';
  container.appendChild(s);
  s.addEventListener('animationend',()=>s.remove());
}

/* ════════════════════════════════════════════
   ORB RENDERERS — each power has its own visual language
════════════════════════════════════════════ */

function drawOrb(key, p, t){
  const cnv=orbCanvases[key];
  if(!cnv)return;
  const ctx=cnv.getContext('2d');
  const W=cnv.width, H=cnv.height;
  const cx=W/2, cy=H/2;
  const R=W*0.42;
  const glow=getWarriorGlow();
  const norm=(p.value-p.min)/(p.max-p.min); // 0..1
  const [c1,c2]=p.orbColor;

  ctx.clearRect(0,0,W,H);

  // base orb sphere
  const bgGrad=ctx.createRadialGradient(cx-R*.28,cy-R*.28,R*.05,cx,cy,R);
  bgGrad.addColorStop(0,'rgba(255,255,255,0.06)');
  bgGrad.addColorStop(.5,'rgba(0,0,0,0.55)');
  bgGrad.addColorStop(1,'rgba(0,0,0,0.85)');
  ctx.fillStyle=bgGrad;
  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();

  switch(p.orbType){
    case 'spin':    drawOrbSpin(ctx,cx,cy,R,t,norm,c1,c2,glow); break;
    case 'puff':    drawOrbPuff(ctx,cx,cy,R,t,norm,c1,c2,glow); break;
    case 'float':   drawOrbFloat(ctx,cx,cy,R,t,norm,c1,c2,glow); break;
    case 'glow':    drawOrbGlow(ctx,cx,cy,R,t,norm,c1,c2,glow); break;
    case 'dissolve':drawOrbDissolve(ctx,cx,cy,R,t,norm,c1,c2,glow); break;
    case 'burst':   drawOrbBurst(ctx,cx,cy,R,t,norm,c1,c2,glow); break;
  }

  // glass rim
  const rimGrad=ctx.createRadialGradient(cx-R*.3,cy-R*.38,R*.1,cx,cy,R);
  rimGrad.addColorStop(0,'rgba(255,255,255,0.18)');
  rimGrad.addColorStop(.35,'rgba(255,255,255,0.04)');
  rimGrad.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=rimGrad;
  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();

  // outer glow ring when value > 0
  if(norm>0){
    ctx.save();
    ctx.shadowBlur=16*norm;
    ctx.shadowColor=c1;
    ctx.strokeStyle=c1+'66';
    ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(cx,cy,R+2,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }
}

/* ── SPIN: rotating vortex arms ── */
function drawOrbSpin(ctx,cx,cy,R,t,norm,c1,c2,glow){
  if(norm===0){
    // sleeping zzz
    ctx.fillStyle='rgba(255,255,255,0.08)';
    ctx.font=`${R*.55}px serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('💤',cx,cy);
    return;
  }
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,R*.98,0,Math.PI*2);ctx.clip();
  const speed=norm*0.06+0.01;
  const arms=Math.ceil(norm*3)+2;
  for(let a=0;a<arms;a++){
    const ang=t*speed*8+a*(Math.PI*2/arms);
    const x1=cx+Math.cos(ang)*R*.08;
    const y1=cy+Math.sin(ang)*R*.08;
    const x2=cx+Math.cos(ang+Math.PI*.55)*R*.85;
    const y2=cy+Math.sin(ang+Math.PI*.55)*R*.85;
    const gr=ctx.createLinearGradient(x1,y1,x2,y2);
    gr.addColorStop(0,hexA(c1,0.7*norm));
    gr.addColorStop(.5,hexA(c2,0.4*norm));
    gr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.strokeStyle=gr;
    ctx.lineWidth=R*.22*norm;
    ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  }
  // center core
  const core=ctx.createRadialGradient(cx,cy,0,cx,cy,R*.25);
  core.addColorStop(0,hexA(c1,0.9));
  core.addColorStop(.6,hexA(c2,0.3));
  core.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=core;
  ctx.beginPath();ctx.arc(cx,cy,R*.28,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

/* ── PUFF: expanding cloud blobs ── */
function drawOrbPuff(ctx,cx,cy,R,t,norm,c1,c2,glow){
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,R*.98,0,Math.PI*2);ctx.clip();
  ctx.globalCompositeOperation='screen';
  const numPuffs=Math.ceil(norm*4)+1;
  for(let i=0;i<numPuffs;i++){
    const phase=t*0.018+(i*Math.PI*2/numPuffs);
    const px=cx+Math.cos(phase)*R*(.28+norm*.15);
    const py=cy+Math.sin(phase*0.7)*R*(.22+norm*.12);
    const pr2=R*(.25+norm*.22+.08*Math.sin(t*.04+i));
    const pg=ctx.createRadialGradient(px,py,0,px,py,pr2);
    pg.addColorStop(0,hexA(c1,0.55*norm));
    pg.addColorStop(.45,hexA(c2,0.25*norm));
    pg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=pg;
    ctx.beginPath();ctx.arc(px,py,pr2,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
  if(norm===0){
    ctx.fillStyle='rgba(255,255,255,0.06)';
    ctx.font=`${R*.5}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🌫️',cx,cy);
  }
}

/* ── FLOAT: orb content rises/falls ── */
function drawOrbFloat(ctx,cx,cy,R,t,norm,c1,c2,glow){
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,R*.98,0,Math.PI*2);ctx.clip();
  const normFull=(norm+1)/2; // remap -1..1 → 0..1
  // vertical fill level
  const fillY=cy+R*(1-normFull*2);
  const waveAmp=R*.06;
  ctx.beginPath();
  ctx.moveTo(cx-R,cy+R);
  for(let x=-R;x<=R;x+=4){
    const wx=cx+x;
    const wy=fillY+Math.sin(x*0.08+t*0.035)*waveAmp;
    if(x===-R) ctx.moveTo(wx,wy); else ctx.lineTo(wx,wy);
  }
  ctx.lineTo(cx+R,cy+R);ctx.closePath();
  const wg=ctx.createLinearGradient(cx,fillY-waveAmp,cx,cy+R);
  wg.addColorStop(0,hexA(c1,0.65));
  wg.addColorStop(.5,hexA(c2,0.45));
  wg.addColorStop(1,hexA(c1,0.15));
  ctx.fillStyle=wg;ctx.fill();
  // bubble
  if(normFull>0.5){
    const bub=ctx.createRadialGradient(cx-R*.2,fillY-R*.2,0,cx-R*.2,fillY-R*.2,R*.18);
    bub.addColorStop(0,'rgba(255,255,255,0.35)');
    bub.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=bub;ctx.beginPath();ctx.arc(cx-R*.2,fillY-R*.2,R*.18,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
  // arrow indicator
  const arrowY= normFull>0.55 ? cy-R*.55 : normFull<0.45 ? cy+R*.55 : cy;
  const arrowChar= normFull>0.55?'↑': normFull<0.45?'↓':'·';
  ctx.fillStyle=hexA(c1,0.8);
  ctx.font=`bold ${R*.38}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(arrowChar,cx,arrowY);
}

/* ── GLOW: pulsing halo rings ── */
function drawOrbGlow(ctx,cx,cy,R,t,norm,c1,c2,glow){
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,R*.98,0,Math.PI*2);ctx.clip();
  if(norm===0){
    ctx.fillStyle='rgba(255,255,255,0.05)';
    ctx.font=`${R*.5}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🔦',cx,cy);ctx.restore();return;
  }
  const rings=Math.ceil(norm*4)+1;
  for(let i=rings;i>=0;i--){
    const phase=t*0.028-i*0.4;
    const rr=R*(.12+(i/rings)*.82+.05*Math.sin(phase));
    const alpha=norm*(1-i/rings)*.45;
    const rg=ctx.createRadialGradient(cx,cy,rr*.2,cx,cy,rr);
    rg.addColorStop(0,hexA(c1,alpha*1.4));
    rg.addColorStop(.5,hexA(c2,alpha*.6));
    rg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=rg;
    ctx.beginPath();ctx.arc(cx,cy,rr,0,Math.PI*2);ctx.fill();
  }
  // central star burst when high
  if(norm>0.5){
    const rays=6;
    ctx.strokeStyle=hexA(c1,norm*.9);
    ctx.lineWidth=1.5;
    for(let r=0;r<rays;r++){
      const ang=r*(Math.PI*2/rays)+t*0.02;
      const len=R*(.22+norm*.3);
      ctx.beginPath();
      ctx.moveTo(cx+Math.cos(ang)*R*.1,cy+Math.sin(ang)*R*.1);
      ctx.lineTo(cx+Math.cos(ang)*len,cy+Math.sin(ang)*len);
      ctx.stroke();
    }
  }
  ctx.restore();
}

/* ── DISSOLVE: concentric fading rings ── */
function drawOrbDissolve(ctx,cx,cy,R,t,norm,c1,c2,glow){
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,R*.98,0,Math.PI*2);ctx.clip();
  if(norm===0){
    ctx.fillStyle='rgba(255,255,255,0.06)';
    ctx.font=`${R*.5}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🐢',cx,cy);ctx.restore();return;
  }
  const speed=norm*0.055+0.008;
  const numRings=5;
  for(let i=0;i<numRings;i++){
    const phase=((t*speed+i/numRings)%1);
    const rr=R*phase*.95;
    const alpha=(1-phase)*norm*.55;
    ctx.strokeStyle=hexA(i%2===0?c1:c2,alpha);
    ctx.lineWidth=2.5*(1-phase);
    ctx.beginPath();ctx.arc(cx,cy,rr,0,Math.PI*2);ctx.stroke();
  }
  // center dot
  const cd=ctx.createRadialGradient(cx,cy,0,cx,cy,R*.18);
  cd.addColorStop(0,hexA(c1,0.8*norm));
  cd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=cd;ctx.beginPath();ctx.arc(cx,cy,R*.18,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

/* ── BURST: exploding particles ── */
function drawOrbBurst(ctx,cx,cy,R,t,norm,c1,c2,glow){
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,R*.98,0,Math.PI*2);ctx.clip();
  if(norm===0){
    ctx.fillStyle='rgba(255,255,255,0.06)';
    ctx.font=`${R*.5}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('😴',cx,cy);ctx.restore();return;
  }
  const nParts=Math.ceil(norm*12)+4;
  const baseSpeed=norm*0.02+0.005;
  for(let i=0;i<nParts;i++){
    const ang=i*(Math.PI*2/nParts)+t*0.012*(i%2===0?1:-1);
    const phase=((t*baseSpeed+i/nParts)%1);
    const dist=R*phase*.9;
    const alpha=(1-phase)*norm*.75;
    const sz=R*(.055+norm*.045)*(1-phase*.5);
    const px=cx+Math.cos(ang)*dist;
    const py=cy+Math.sin(ang)*dist;
    const pg=ctx.createRadialGradient(px,py,0,px,py,sz);
    pg.addColorStop(0,hexA(i%3===0?c1:c2,alpha*1.3));
    pg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=pg;
    ctx.beginPath();ctx.arc(px,py,sz,0,Math.PI*2);ctx.fill();
  }
  // center pulse
  const pulse=0.5+0.5*Math.sin(t*norm*0.08);
  const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,R*(.18+.1*pulse));
  cg.addColorStop(0,hexA(c1,0.9*norm));
  cg.addColorStop(.5,hexA(c2,0.4*norm));
  cg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=cg;ctx.beginPath();ctx.arc(cx,cy,R*(.2+.1*pulse),0,Math.PI*2);ctx.fill();
  ctx.restore();
}

/* hex to rgba helper */
function hexA(hex,alpha){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha.toFixed(3)})`;
}

/* ════════════════════════════════════════════
   SMOKE ENGINE (original, untouched)
════════════════════════════════════════════ */
function n2(t,f,p){
  return .42*Math.sin(t*f+p)+.28*Math.sin(t*f*1.618+p*1.3)
        +.18*Math.sin(t*f*2.618+p*2.1)+.12*Math.sin(t*f*4.236+p*3.4);
}
function hsl2rgb(h,s,l){
  s/=100;l/=100;
  const a=s*Math.min(l,1-l);
  const f=(n,k=(n+h/30)%12)=>l-a*Math.max(Math.min(k-3,9-k,1),-1);
  return[Math.round(f(0)*255),Math.round(f(8)*255),Math.round(f(4)*255)];
}
function breathwave(soul){
  const ph=(performance.now()%soul.bperiod)/soul.bperiod;
  return .5-.5*Math.cos(ph*Math.PI*2);
}
const BASE_SPEED=.0108,BASE_BPM=62;
function heartbeat(soul){
  const bpm=BASE_BPM*(soul.speed/BASE_SPEED);
  const period=60000/bpm;
  const ph=(performance.now()%period)/period;
  const g=(x,mu,sig)=>Math.exp(-.5*((x-mu)/sig)**2);
  return Math.max(0,g(ph,.10,.045)+g(ph,.22,.055)*.58);
}
function drawSmoke(oc,soul,W,H){
  const cx=W/2,cy=H/2,R=W*.46;
  const t=T[soul.id];
  const HB=heartbeat(soul),BW=breathwave(soul);
  const om=1+.09*BW*POWERS.centrifugal.value;
  oc.clearRect(0,0,W,H);oc.save();
  oc.beginPath();oc.arc(cx,cy,R,0,Math.PI*2);oc.clip();
  oc.fillStyle='#020208';oc.fillRect(0,0,W,H);
  const baseRGB=hsl2rgb(soul.h,Math.min(soul.s*2.8,72),52);
  const a3=soul.a3;
  const PUFFS=[
    {seed:1,ox:Math.cos(t*.50)*R*.44*om,      oy:Math.sin(t*.40)*R*.40*om,      col:baseRGB,alpha:.72},
    {seed:2,ox:Math.cos(t*.70+2.1)*R*.42*om,  oy:Math.sin(t*.60+1.0)*R*.44*om,  col:baseRGB,alpha:.58},
    {seed:3,ox:Math.cos(t*.90+4.2)*R*.46*om,  oy:Math.sin(t*.80+3.0)*R*.42*om,  col:a3,     alpha:.52},
    {seed:4,ox:Math.cos(t*.38+3.1)*R*.48*om,  oy:Math.sin(t*.32+1.7)*R*.44*om,  col:a3,     alpha:.40},
    {seed:5,ox:Math.cos(t*.55+5.4)*R*.32*om,  oy:Math.sin(t*.48+4.2)*R*.30*om,  col:baseRGB,alpha:.46},
    {seed:6,ox:Math.cos(t*.60+1.5)*R*.34*om,  oy:Math.sin(t*1.00+2.5)*R*.34*om, col:baseRGB,alpha:.42},
    {seed:7,ox:Math.cos(t*1.10+0.8)*R*.30*om, oy:Math.sin(t*.85+3.8)*R*.32*om,  col:a3,     alpha:.35},
  ];
  oc.globalCompositeOperation='screen';
  PUFFS.forEach(p=>{
    const s=p.seed;
    const driftBias=POWERS.drift.value*.18;
    const ox=p.ox,oy=p.oy-R*driftBias*(1+s*.12);
    const sx=1+.38*n2(t,.13,s*1.3);
    const sy=1+.32*n2(t,.11,s*2.1);
    const rot=n2(t,.17,s*.7)*.9;
    const pSize=R*(.30+.18*n2(t,.23,s*1.1))*(1+.12*HB);
    for(let i=0;i<5;i++){
      const fi=i/5;
      const fdx=pSize*.45*n2(t,.31+i*.07,s*.9+i*1.1);
      const fdy=pSize*.38*n2(t,.29+i*.05,s*1.7+i*.9);
      const fr=pSize*(.55-fi*.25)*(1+.15*n2(t,.19,s+i));
      const fa=p.alpha*POWERS.density.value*(1-Math.pow(fi,.5+POWERS.dissipation.value*.6)*.72)*(1+.22*HB);
      oc.save();
      oc.translate(cx+ox,cy+oy);oc.rotate(rot);
      oc.scale(sx*(1-fi*.12),sy*(1-fi*.08));
      const g=oc.createRadialGradient(fdx,fdy,0,fdx,fdy,fr);
      const[r,gv,b]=p.col;
      const hs=POWERS.halo.value;
      const rl=Math.min(r+Math.round(50*hs),255);
      const gl=Math.min(gv+Math.round(50*hs),255);
      const bl=Math.min(b+Math.round(50*hs),255);
      g.addColorStop(0,`rgba(${r},${gv},${b},${Math.min(fa,.95)})`);
      g.addColorStop(.18,`rgba(${rl},${gl},${bl},${fa*.55*Math.min(hs,1.5)})`);
      g.addColorStop(.45,`rgba(${r},${gv},${b},${fa*.28})`);
      g.addColorStop(.72,`rgba(${r},${gv},${b},${fa*.08})`);
      g.addColorStop(1,`rgba(${r},${gv},${b},0)`);
      oc.fillStyle=g;oc.beginPath();oc.arc(fdx,fdy,fr,0,Math.PI*2);oc.fill();
      oc.restore();
    }
  });
  const turbMul=POWERS.turbulence.value;
  if(turbMul>0){
    const nV=Math.round(4+turbMul*4);
    for(let k=0;k<nV;k++){
      const ka=k*(Math.PI*2/nV)+t*.03;
      const kn=n2(t,.07+k*.03,k*2.3);
      const tx1=cx+R*.7*Math.cos(ka)*kn,ty1=cy+R*.7*Math.sin(ka)*kn;
      const vr=R*(.08+.08*turbMul)*(.6+.4*Math.abs(kn));
      const[r,gv,b]=baseRGB;
      const vg=oc.createRadialGradient(tx1,ty1,0,tx1,ty1,vr);
      vg.addColorStop(0,`rgba(${r},${gv},${b},${.14*turbMul*(1+HB*.3)})`);
      vg.addColorStop(.4,`rgba(${r},${gv},${b},0.04)`);
      vg.addColorStop(1,`rgba(${r},${gv},${b},0)`);
      oc.fillStyle=vg;oc.beginPath();oc.arc(tx1,ty1,vr,0,Math.PI*2);oc.fill();
    }
  }
  oc.globalCompositeOperation='screen';
  const lx=cx+Math.cos(t*.45+1)*R*.32,ly=cy+Math.sin(t*.55+.5)*R*.28;
  const sh=oc.createRadialGradient(lx,ly,0,lx,ly,R*.28);
  const[r,gv,b]=hsl2rgb(soul.h,48,82);
  sh.addColorStop(0,`rgba(${r},${gv},${b},${.22+BW*.08+HB*.06})`);
  sh.addColorStop(.5,`rgba(${r},${gv},${b},0.06)`);
  sh.addColorStop(1,'rgba(0,0,0,0)');
  oc.fillStyle=sh;oc.fillRect(0,0,W,H);
  oc.globalCompositeOperation='source-over';
  const vg2=oc.createRadialGradient(cx,cy,R*.28,cx,cy,R);
  vg2.addColorStop(0,'rgba(0,0,0,0)');
  vg2.addColorStop(.65,'rgba(1,1,7,0.48)');
  vg2.addColorStop(1,'rgba(1,1,9,0.93)');
  oc.fillStyle=vg2;oc.fillRect(0,0,W,H);
  oc.restore();
}

/* ════════════════════════════════════════════
   SIZE SYNC
════════════════════════════════════════════ */
function syncSizes(){
  WARRIORS.forEach(w=>{
    const cnv=cnvMap[w.id];
    if(!cnv)return;
    const wrapEl=document.getElementById('wrap_'+w.id);
    if(!wrapEl)return;
    const rect=wrapEl.getBoundingClientRect();
    const s=Math.max(Math.round(rect.width),2);
    if(cnv.width!==s||cnv.height!==s){cnv.width=s;cnv.height=s;}
    const oc=off[w.id];
    if(oc.c.width!==s){oc.c.width=s;oc.c.height=s;}
  });
  const hc=document.getElementById('hero-canvas');
  if(hc){
    const rect=hc.getBoundingClientRect();
    const s=Math.max(Math.round(rect.width),2);
    if(hc.width!==s){hc.width=s;hc.height=s;heroOff.width=s;heroOff.height=s;}
  }
}

/* ════════════════════════════════════════════
   MAIN LOOP
════════════════════════════════════════════ */
let globalT=0;
function loop(){
  globalT++;
  syncSizes();

  // warriors smoke
  WARRIORS.forEach(w=>{
    T[w.id]+=w.speed;
    const cnv=cnvMap[w.id];
    const oc=off[w.id];
    if(!cnv||cnv.width<2)return;
    drawSmoke(oc.ctx,w,cnv.width,cnv.height);
    const ctx2=cnv.getContext('2d');
    ctx2.clearRect(0,0,cnv.width,cnv.height);
    ctx2.drawImage(oc.c,0,0);
  });

  // hero canvas
  const hc=document.getElementById('hero-canvas');
  if(hc&&hc.width>2){
    const w=WARRIORS.find(x=>x.id===selectedId);
    if(w){
      drawSmoke(heroOffCtx,w,hc.width,hc.height);
      const hctx=hc.getContext('2d');
      hctx.clearRect(0,0,hc.width,hc.height);
      hctx.drawImage(heroOff,0,0);
    }
  }

  // orbs
  Object.entries(POWERS).forEach(([key,p])=>{
    orbT[key]=(orbT[key]||0)+1;
    drawOrb(key,p,orbT[key]);
  });

  requestAnimationFrame(loop);
}

/* ════════════════════════════════════════════
   INIT
════════════════════════════════════════════ */
buildOrbsGrid();
selectWarrior('b');
setTimeout(()=>{syncSizes();loop();},150);
window.addEventListener('resize',syncSizes);
</script>
