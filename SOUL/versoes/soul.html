<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Electric Soul Morphing</title>
    <style>
        body { background: #020205; margin: 0; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Courier New', monospace; }
        .container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 20px; }
        .card { display: flex; flex-direction: column; align-items: center; }
        canvas { background: #000; border-radius: 50%; width: 220px; height: 220px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .label { color: rgba(255,255,255,0.3); font-size: 10px; margin-top: 10px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="container" id="grid"></div>

<script>
const CONFIGS = [
    { name: 'Plasma', h: 200, tension: 0.4, turb: 0.05, glow: 1.2, speed: 0.005 },
    { name: 'Arco Voltaico', h: 180, tension: 0.9, turb: 0.15, glow: 2.0, speed: 0.012 },
    { name: 'Fuligem', h: 30, tension: 0.2, turb: 0.08, glow: 0.5, speed: 0.008 },
    { name: 'Nebulosa', h: 280, tension: 0.1, turb: 0.03, glow: 0.8, speed: 0.003 },
    { name: 'Chama Fria', h: 160, tension: 0.6, turb: 0.12, glow: 1.5, speed: 0.020 },
    { name: 'Sobrecarga', h: 10, tension: 1.2, turb: 0.25, glow: 2.5, speed: 0.040 }
];

function createHeartbeat(speed) {
    const ph = (performance.now() * speed / 10) % 1;
    const gauss = (x, mu, sig) => Math.exp(-0.5 * Math.pow((x - mu) / sig, 2));
    return Math.max(0, gauss(ph, 0.12, 0.05) + gauss(ph, 0.25, 0.06) * 0.5);
}

function n2(t, f, p) {
    return 0.5 * Math.sin(t * f + p) + 0.3 * Math.sin(t * f * 1.618 + p * 1.3) + 0.2 * Math.sin(t * f * 2.3) ;
}

class Soul {
    constructor(cfg, canvas) {
        this.cfg = cfg;
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.t = Math.random() * 100;
        this.w = canvas.width;
        this.h = canvas.height;
    }

    draw() {
        const { ctx, w, h, cfg } = this;
        const hb = createHeartbeat(cfg.speed);
        this.t += cfg.speed;

        ctx.clearRect(0, 0, w, h);
        
        // Efeito de Persistência (Trail)
        ctx.fillStyle = 'rgba(0, 0, 10, 0.1)';
        ctx.fillRect(0, 0, w, h);

        const cx = w / 2, cy = h / 2;
        const baseRadius = w * 0.35;
        const points = 12;

        ctx.save();
        ctx.translate(cx, cy);
        
        // Camadas de Fumaça Elétrica
        for (let layer = 0; layer < 3; layer++) {
            ctx.beginPath();
            const layerOffset = layer * 1.5;
            
            for (let i = 0; i <= points; i++) {
                const angle = (i / points) * Math.PI * 2;
                
                // Deslocamento Elétrico (Morfogênese)
                const noiseVal = n2(this.t, 1.2, i + layerOffset);
                const disp = (noiseVal * 30 * cfg.tension) + (hb * 25 * cfg.glow);
                const r = baseRadius + disp - (layer * 15);

                const x = Math.cos(angle) * r;
                const y = Math.sin(angle) * r;

                if (i === 0) ctx.moveTo(x, y);
                else {
                    const cpAngle = angle - (0.5 / points);
                    const cpR = r + (n2(this.t, 2, i) * 20 * cfg.turb);
                    ctx.quadraticCurveTo(Math.cos(cpAngle)*cpR, Math.sin(cpAngle)*cpR, x, y);
                }
            }

            const alpha = (0.6 - layer * 0.15) * (0.8 + hb * 0.4);
            const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, baseRadius * 1.5);
            gradient.addColorStop(0, `hsla(${cfg.h}, 80%, ${70 + hb * 20}%, ${alpha})`);
            gradient.addColorStop(0.5, `hsla(${cfg.h + 20}, 60%, 40%, ${alpha * 0.5})`);
            gradient.addColorStop(1, `transparent`);

            ctx.fillStyle = gradient;
            ctx.fill();
            
            // Stroke Elétrico (Fio de tensão)
            if (cfg.tension > 0.5) {
                ctx.strokeStyle = `hsla(${cfg.h}, 100%, 80%, ${0.1 * cfg.glow})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }
        ctx.restore();
    }
}

// Inicialização
const grid = document.getElementById('grid');
const instances = CONFIGS.map(cfg => {
    const container = document.createElement('div');
    container.className = 'card';
    const canvas = document.createElement('canvas');
    canvas.width = 300; canvas.height = 300;
    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = cfg.name;
    
    container.appendChild(canvas);
    container.appendChild(label);
    grid.appendChild(container);
    
    return new Soul(cfg, canvas);
});

function loop() {
    instances.forEach(s => s.draw());
    requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
