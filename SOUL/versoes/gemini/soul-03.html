<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Liquid Sphere - Grayscale Core</title>
    <style>
        body { background: #000; margin: 0; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; min-height: 100vh; gap: 40px; }
        
        /* A MÁGICA: O container cria a ilusão de lente e esfera */
        .sphere-container {
            position: relative;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: #000;
            overflow: hidden;
            /* Filtro de Contraste para fundir os blobs em líquido */
            filter: contrast(18) brightness(1.2);
            box-shadow: inset 0 0 50px rgba(255,255,255,0.05);
        }

        /* Camada de Lente para dar volume de vidro */
        .sphere-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1) 0%, transparent 60%);
            pointer-events: none;
            z-index: 2;
        }

        canvas { width: 100%; height: 100%; filter: blur(12px); }

        .label { 
            text-align: center; color: #444; font-family: 'Courier New', monospace; 
            font-size: 10px; margin-top: 15px; letter-spacing: 4px; text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="sphere-container" id="s1"></div>
    <div class="label">Soul Grayscale</div>
</div>

<script>
class LiquidCore {
    constructor(containerId) {
        this.canvas = document.createElement('canvas');
        this.ctx = this.canvas.getContext('2d');
        this.w = this.canvas.width = 300;
        this.h = this.canvas.height = 300;
        document.getElementById(containerId).appendChild(this.canvas);
        
        this.particles = Array.from({ length: 8 }, () => ({
            x: Math.random() * this.w,
            y: Math.random() * this.h,
            vx: (Math.random() - 0.5) * 1.5,
            vy: (Math.random() - 0.5) * 1.5,
            r: Math.random() * 60 + 40
        }));
    }

    draw() {
        const { ctx, w, h, particles } = this;
        const time = performance.now() * 0.001;
        
        // Fundo não totalmente preto para gerar profundidade nos tons de cinza
        ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
        ctx.fillRect(0, 0, w, h);

        particles.forEach((p, i) => {
            // Movimento orgânico
            p.x += p.vx + Math.sin(time + i) * 0.5;
            p.y += p.vy + Math.cos(time + i) * 0.5;

            if (p.x < 0 || p.x > w) p.vx *= -1;
            if (p.y < 0 || p.y > h) p.vy *= -1;

            // Renderização em tons de cinza (Luminância)
            const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
            
            // Aqui definimos a "massa" branca/cinza
            const brightness = 150 + Math.sin(time * 2) * 50; 
            grad.addColorStop(0, `rgba(${brightness}, ${brightness}, ${brightness}, 1)`);
            grad.addColorStop(0.5, `rgba(60, 60, 60, 0.4)`);
            grad.addColorStop(1, "rgba(0, 0, 0, 0)");

            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fill();
        });

        requestAnimationFrame(() => this.draw());
    }
}

const soul = new LiquidCore('s1');
soul.draw();
</script>
</body>
</html>
