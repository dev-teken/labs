<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Soul Grid - High Luminance</title>
<style>
    body { background: #000; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; }
    /* Filtro para dar o "vibe" de luz difusa e orgânica */
    .soul-container { 
        position: relative; width: 240px; height: 240px; 
        filter: saturate(1.8) brightness(1.2); 
    }
    canvas { width: 100%; height: 100%; border-radius: 50%; }
    .label { 
        color: #fff; opacity: 0.3; font-family: 'Courier New', monospace; 
        font-size: 10px; text-align: center; margin-top: 15px; letter-spacing: 4px; 
    }
</style>
</head>
<body>

<div class="grid" id="grid"></div>

<script>
const SOULS = [
  {id:'a', h:200, s:100, l:60, a3:'#4eeff0', label:'névoa'},
  {id:'b', h:15,  s:90,  l:55, a3:'#ff7d50', label:'terra'},
  {id:'c', h:140, s:85,  l:50, a3:'#90ff90', label:'bosque'},
  {id:'d', h:280, s:95,  l:65, a3:'#ff50ff', label:'cosmos'},
  {id:'e', h:45,  s:90,  l:60, a3:'#ffff80', label:'areia'},
  {id:'f', h:330, s:90,  l:55, a3:'#ff60b0', label:'crepúsculo'}
];

class Soul {
    constructor(cfg, canvas) {
        this.cfg = cfg;
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.t = Math.random() * 100;
        this.particles = Array.from({ length: 5 }, (_, i) => ({
            id: i,
            x: 0, y: 0,
            seed: Math.random() * 10
        }));
    }

    draw() {
        const { ctx, canvas, cfg, t } = this;
        const w = canvas.width, h = canvas.height;
        const cx = w/2, cy = h/2;
        
        // Batimento cardíaco simulado para brilho
        const hb = Math.pow(Math.sin(performance.now() * 0.002), 8) * 0.5;
        this.t += 0.008;

        ctx.clearRect(0, 0, w, h);
        
        // FUNDO ABISSAL
        ctx.fillStyle = '#010105';
        ctx.beginPath(); ctx.arc(cx, cy, w*0.45, 0, Math.PI*2); ctx.fill();

        // MODO DE MESCLAGEM PARA INCANDESCÊNCIA
        // 'lighter' soma os valores de cor, criando o efeito de luz branca no centro
        ctx.globalCompositeOperation = 'lighter';

        this.particles.forEach(p => {
            const angle = (this.t * 0.5) + (p.id * Math.PI * 2 / 5);
            const drift = Math.sin(this.t + p.seed) * 30;
            const x = cx + Math.cos(angle) * drift;
            const y = cy + Math.sin(angle) * (drift * 0.8);
            
            const r = (w * 0.3) * (1 + hb + Math.sin(this.t + p.id) * 0.2);

            const g = ctx.createRadialGradient(x, y, 0, x, y, r);
            
            // CORES MAIS ILUMINADAS (Padrão da Imagem)
            // O centro é quase branco, as bordas são saturadas
            g.addColorStop(0, `hsla(${cfg.h}, ${cfg.s}%, 95%, ${0.8 + hb})`);
            g.addColorStop(0.2, `hsla(${cfg.h}, ${cfg.s}%, ${cfg.l}%, 0.5)`);
            g.addColorStop(0.5, `hsla(${cfg.h + 20}, ${cfg.s}%, ${cfg.l - 10}%, 0.2)`);
            g.addColorStop(1, 'transparent');

            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fill();
        });

        // ADICIONA O "ACCENT" COMO PONTOS DE LUZ ELÉTRICA
        ctx.globalCompositeOperation = 'screen';
        const ax = cx + Math.sin(this.t * 1.5) * 40;
        const ay = cy + Math.cos(this.t * 1.2) * 40;
        const ag = ctx.createRadialGradient(ax, ay, 0, ax, ay, w*0.25);
        ag.addColorStop(0, cfg.a3 + 'cc'); // Cor accent com transparência
        ag.addColorStop(1, 'transparent');
        ctx.fillStyle = ag;
        ctx.fill();

        // VINHETA DE LENTE
        ctx.globalCompositeOperation = 'source-over';
        const vg = ctx.createRadialGradient(cx, cy, w*0.2, cx, cy, w*0.5);
        vg.addColorStop(0, 'transparent');
        vg.addColorStop(1, 'rgba(0,0,0,0.8)');
        ctx.fillStyle = vg; ctx.fillRect(0,0,w,h);

        requestAnimationFrame(() => this.draw());
    }
}

// Build
const grid = document.getElementById('grid');
SOULS.forEach(cfg => {
    const cont = document.createElement('div');
    cont.className = 'soul-container';
    const cvs = document.createElement('canvas');
    cvs.width = 400; cvs.height = 400;
    const lbl = document.createElement('div');
    lbl.className = 'label';
    lbl.textContent = cfg.label;
    
    cont.appendChild(cvs);
    cont.appendChild(lbl);
    grid.appendChild(cont);
    
    new Soul(cfg, cvs).draw();
});
</script>
</body>
</html>
